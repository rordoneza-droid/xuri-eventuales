<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a5c32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="XURI">
<link rel="manifest" href="manifest.json">
<title>XURI S.A.</title>
<style>
:root{--v:#1a5c32;--vc:#e8f3e8;--r:#c0392b;--a:#d4860b;--az:#1a6fa3;--bg:#f4f6f4;--bd:#dde5dd;--w:#fff;--tx:#1a1a1a;--t2:#5a7a5a;--t3:#9aaa9a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px}
#loader{position:fixed;inset:0;background:var(--v);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:14px}
#loader h2{font-size:22px;font-weight:800}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:calc(env(safe-area-inset-bottom)+72px);left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:9999;pointer-events:none;white-space:nowrap;max-width:92vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--v)}#toast.err{background:var(--r)}
#login{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:100;overflow-y:auto}
.lcard{background:var(--w);border-radius:20px;border:1px solid var(--bd);padding:28px 22px;width:100%;max-width:360px}
.llogo{text-align:center;margin-bottom:22px}
.llogo .emp{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.15em;text-transform:uppercase}
.llogo h1{font-size:26px;font-weight:800;color:var(--v);margin-top:4px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.rbtn{padding:13px 6px;border-radius:12px;border:2px solid var(--bd);background:#fafcfa;cursor:pointer;text-align:center;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
.rbtn.sel{border-color:var(--v);background:var(--vc)}
.rico{font-size:22px}.rlbl{font-size:11px;font-weight:700;color:var(--tx)}
.pinw{display:flex;gap:8px;margin-bottom:6px;position:relative}
.pinw input{flex:1;padding:12px 40px 12px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:16px;background:var(--w)}
.pin-eye{position:absolute;right:100px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;font-size:18px;color:var(--t3)}
#app{display:none;height:100%;flex-direction:column}
#app.show{display:flex}
.hdr{background:var(--v);color:#fff;padding:env(safe-area-inset-top) 0 0;flex-shrink:0}
.hdri{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.hrol{font-size:10px;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:99px}
.bout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.sdot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:4px}
.bnav{display:flex;background:var(--w);border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom)}
.btab{flex:1;padding:10px 4px;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--t3);font-size:10px;font-weight:600}
.btab.act{color:var(--v)}
.bbar{width:20px;height:2px;border-radius:99px;background:transparent;margin-bottom:2px}
.btab.act .bbar{background:var(--v)}
.pages{flex:1;overflow-y:auto}
.page{display:none;padding:14px}
.page.show{display:block}
.card{background:var(--w);border-radius:12px;border:1px solid var(--bd);padding:14px;margin-bottom:12px}
.stit{font-size:15px;font-weight:700;color:var(--v)}
.ssub{font-size:12px;color:var(--t3)}
.fg{display:grid;gap:10px;margin-bottom:10px}
.fg2{grid-template-columns:1fr 1fr}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;color:var(--tx)}
.btn{padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.96)}
.bg{background:var(--v);color:#fff}
.br{background:var(--r);color:#fff}
.bgr{background:#f0f4f0;color:#444;border:1px solid var(--bd)}
.bfull{width:100%}
.wcard{background:var(--w);border-radius:12px;border:1px solid var(--bd);padding:14px;margin-bottom:10px;display:flex;gap:12px}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;background:var(--vc);color:var(--v)}
.winfo{flex:1;min-width:0}
.wname{font-weight:700;font-size:14px}
.mcard{background:var(--w);border-radius:12px;border:2px solid var(--bd);padding:14px;margin-bottom:8px}
.mcard.pre{border-color:var(--v);background:#f2fbf2}
.mtop{display:flex;align-items:center;gap:12px}
.mchk{width:30px;height:30px;border-radius:8px;border:2px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--w)}
.mchk.on{background:var(--v);border-color:var(--v);color:#fff}
.mdet{margin-top:12px;display:none;flex-direction:column;gap:8px}
.mdet.show{display:flex}
.mtimes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end}
.chk-box{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--t2);height:40px}
.iwrap{overflow-x:auto;border-radius:12px;border:1px solid var(--bd);margin-bottom:12px}
.iwrap table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
.iwrap th{background:#f0f4f0;padding:8px;text-align:left;border-bottom:1px solid var(--bd)}
.iwrap td{padding:8px;border-bottom:1px solid #f4f6f4}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
.mbg.show{display:flex}
.msheet{background:var(--w);border-radius:20px 20px 0 0;width:100%;max-width:540px;padding:20px}
.sep{height:1px;background:var(--bd);margin:12px 0}
.alerto{background:#fef3e2;border:1px solid #f5d89a;border-radius:8px;padding:10px;font-size:12px;color:#7d4e00;margin-bottom:10px}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><h2>XURI S.A.</h2></div>
<div id="toast"></div>
<div id="login">
<div class="lcard">
  <div class="llogo"><div class="emp">XURI S.A.</div><h1>Eventuales</h1></div>
  <div class="rgrid">
    <button class="rbtn sel" onclick="selRol('asistente',this)"><span class="rico">👩‍💼</span><span class="rlbl">RRHH</span></button>
    <button class="rbtn" onclick="selRol('bodega',this)"><span class="rico">📋</span><span class="rlbl">Bodega</span></button>
    <button class="rbtn" onclick="selRol('supervisor',this)"><span class="rico">👁️</span><span class="rlbl">Supervisor</span></button>
    <button class="rbtn" onclick="selRol('jefe',this)"><span class="rico">📊</span><span class="rlbl">Jefe</span></button>
  </div>
  <div class="pinw">
    <input type="password" id="pin" placeholder="Contraseña">
    <button class="pin-eye" onclick="togPin()">👁️</button>
    <button class="btn bg" onclick="login()">Entrar</button>
  </div>
  <div id="lerr" style="color:var(--r);font-size:12px;display:none;margin-top:5px">Contraseña incorrecta</div>
</div>
</div>
<div id="app">
  <div class="hdr"><div class="hdri">
    <div><div style="font-size:9px;opacity:.7">XURI S.A.</div><div id="hrol" class="hrol"></div></div>
    <div style="display:flex;align-items:center;gap:8px"><span class="sdot"></span><button class="bout" onclick="logout()">Salir</button></div>
  </div></div>
  <div class="pages" id="pages"></div>
  <nav class="bnav" id="bnav"></nav>
</div>
<div class="mbg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="msheet"><div id="mtitle" class="stit"></div><div class="sep"></div><div id="mbody"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FC={apiKey:"AIzaSyCQwdoGTh9_J4YXiU1hBd3mGqJBI72_sBk",authDomain:"marcaciones-eventuales.firebaseapp.com",projectId:"marcaciones-eventuales",storageBucket:"marcaciones-eventuales.firebasestorage.app",messagingSenderId:"147359952515",appId:"1:147359952515:web:93b790a8788db42aec75b6"};
const app=initializeApp(FC); const db=getFirestore(app);
const COL={trabajadores:()=>collection(db,'trabajadores'),asistencias:()=>collection(db,'asistencias'),negra:()=>collection(db,'listaNegra')};
const CACHE={trabajadores:[],asistencias:[],negra:[],loaded:false};
const AREAS=['BODEGA','COSECHA','EMPAQUE','RIEGO','FUMIGACION','MANTENIMIENTO','ADMINISTRACION'];
const CLAVES={asistente:'asist2026',bodega:'bodega2026',supervisor:'super2026',jefe:'xuri2026'};

let ROL=null, rolSel='asistente', tabAct='', mFecha=new Date().toISOString().slice(0,10);

function toast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.className='show '+t;setTimeout(()=>e.className='',2500)}
window.togPin=()=>{const i=document.getElementById('pin');i.type=i.type==='password'?'text':'password'};

function startLS(){
  ['trabajadores','asistencias','negra'].forEach(c=>{
    onSnapshot(query(COL[c==='negra'?'negra':c](),orderBy('_ts','desc')),(snap)=>{
      CACHE[c]=snap.docs.map(d=>({...d.data(),id:d.id}));
      if(c==='trabajadores'){ CACHE.loaded=true; document.getElementById('loader').style.display='none'; document.getElementById('login').style.display='flex'; }
      if(ROL) renderTab();
    });
  });
}

window.selRol=(r,b)=>{rolSel=r;document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel')};
window.login=()=>{
  if(document.getElementById('pin').value===CLAVES[rolSel]){
    ROL=rolSel; document.getElementById('login').style.display='none'; document.getElementById('app').classList.add('show');
    document.getElementById('hrol').textContent=ROL.toUpperCase(); initNav();
  }else document.getElementById('lerr').style.display='block';
};
window.logout=()=>location.reload();

function initNav(){
  const navs={
    asistente:[{id:'t',lbl:'Personal'},{id:'n',lbl:'Negra'}],
    bodega:[{id:'m',lbl:'Marcación'},{id:'h',lbl:'Historial'}],
    supervisor:[{id:'v',lbl:'Vista General'}],
    jefe:[{id:'i',lbl:'Informes'},{id:'p',lbl:'Personal'}]
  };
  const m=navs[ROL];
  document.getElementById('bnav').innerHTML=m.map(t=>`<button class="btab" onclick="setTab('${t.id}')"><div class="bbar"></div>${t.lbl}</button>`).join('');
  document.getElementById('pages').innerHTML=m.map(t=>`<div id="pg-${t.id}" class="page"></div>`).join('');
  setTab(m[0].id);
}

window.setTab=id=>{tabAct=id;document.querySelectorAll('.btab').forEach((b,i)=>b.classList.toggle('act',navs[ROL][i].id===id));renderTab()};
const navs={asistente:[{id:'t'},{id:'n'}],bodega:[{id:'m'},{id:'h'}],supervisor:[{id:'v'}],jefe:[{id:'i'},{id:'p'}]};

function renderTab(){
  const p=document.getElementById('pg-'+tabAct); if(!p)return;
  if(tabAct==='t'||tabAct==='p') p.innerHTML=renderT();
  if(tabAct==='m') p.innerHTML=renderM();
  if(tabAct==='v') p.innerHTML=renderV();
  if(tabAct==='i') p.innerHTML=renderI();
}

function renderT(){
  const ts=CACHE.trabajadores.filter(t=>t.estado!=='archivado');
  return `<div class="shdr"><div class="stit">Personal (${ts.length})</div><button class="btn bg" onclick="mTrab()">+ Nuevo</button></div>` +
    ts.map(t=>`<div class="wcard"><div class="av">${t.nombres[0]}</div><div class="winfo"><div class="wname">${t.nombres}</div><div class="ssub">${t.area} | ${t.cedula}</div></div><button class="btn bgr" onclick="mTrab('${t.id}')">Edit</button></div>`).join('');
}

function renderM(){
  const ts=CACHE.trabajadores.filter(t=>t.estado==='activo');
  return `<div class="card"><div class="field"><label>Fecha</label><input type="date" value="${mFecha}" onchange="mFecha=this.value;renderTab()"></div></div>` +
    ts.map(t=>{
      const a=CACHE.asistencias.find(x=>x.tId===t.id && x.fecha===mFecha)||{e:'08:00',s:'18:00',f:false};
      return `<div class="mcard ${a.id?'pre':''}">
        <div class="mtop"><div class="mchk ${a.id?'on':''}" onclick="togM('${t.id}')">${a.id?'✓':''}</div><div class="wname">${t.nombres}</div></div>
        <div class="mdet ${a.id?'show':''}">
          <div class="mtimes">
            <div class="field"><label>Entrada</label><input type="time" id="e-${t.id}" value="${a.e}"></div>
            <div class="field"><label>Salida</label><input type="time" id="s-${t.id}" value="${a.s}"></div>
            <div class="chk-box"><input type="checkbox" id="f-${t.id}" ${a.f?'checked':''}> FERIADO</div>
          </div>
        </div></div>`;
    }).join('') + `<button class="btn bg bfull" onclick="saveM()">Guardar Marcación del Día</button>`;
}

function renderV(){
  return `<div class="stit">Lista Detallada de Personal</div>` + 
  CACHE.trabajadores.map(t=>`<div class="wcard"><div class="winfo"><div class="wname">${t.nombres}</div><div class="ssub">C.I: ${t.cedula} | Área: ${t.area}</div></div></div>`).join('');
}

function renderI(){
  return `<div class="card"><div class="fg fg2"><div class="field"><label>Desde</label><input type="date" id="inf-d"></div><div class="field"><label>Hasta</label><input type="date" id="inf-h"></div></div><button class="btn bg bfull" onclick="genInf()">Generar Informe</button></div><div id="res-i"></div>`;
}

window.genInf=()=>{
  const d=document.getElementById('inf-d').value, h=document.getElementById('inf-h').value;
  const filtered = CACHE.asistencias.filter(a=>a.fecha>=d && a.fecha<=h);
  document.getElementById('res-i').innerHTML = `<div class="iwrap"><table><tr><th>Nombre</th><th>Fecha</th><th>Pago</th></tr>` + 
    filtered.map(a=>{
      const t=CACHE.trabajadores.find(x=>x.id===a.tId);
      return `<tr><td>${t?t.nombres:'?'}</td><td>${a.fecha}</td><td>$20.00</td></tr>`;
    }).join('') + `</table></div>`;
};

window.mTrab=(id)=>{
  const t=id?CACHE.trabajadores.find(x=>x.id===id):{nombres:'',cedula:'',area:'BODEGA'};
  openModal(id?'Editar':'Nuevo Personal', `<div class="field"><label>Nombres</label><input id="tn" value="${t.nombres}"></div><div class="field"><label>Cédula</label><input id="tc" value="${t.cedula}"></div><div class="field"><label>Área</label><select id="ta">${AREAS.map(a=>`<option ${t.area===a?'selected':''}>${a}</option>`).join('')}</select></div><button class="btn bg bfull" style="margin-top:10px" onclick="saveT('${id||''}')">Guardar</button>`);
};

window.saveT=async(id)=>{
  const d={nombres:document.getElementById('tn').value,cedula:document.getElementById('tc').value,area:document.getElementById('ta').value,estado:'activo',_ts:serverTimestamp()};
  if(id) await updateDoc(doc(db,'trabajadores',id),d); else await addDoc(COL.trabajadores(),d);
  closeModal(); toast('Guardado'); renderTab();
};

window.togM=(tId)=>{ const d=document.querySelector(`#pg-m .mcard:has(.mchk[onclick*="${tId}"]) .mdet`); d.classList.toggle('show'); };

window.saveM=async()=>{
  const ts=CACHE.trabajadores.filter(t=>t.estado==='activo');
  for(let t of ts){
    const show=document.querySelector(`#pg-m .mcard:has(.mchk[onclick*="${t.id}"]) .mdet`).classList.contains('show');
    if(show){
      const data={tId:t.id,fecha:mFecha,e:document.getElementById('e-'+t.id).value,s:document.getElementById('s-'+t.id).value,f:document.getElementById('f-'+t.id).checked,_ts:serverTimestamp()};
      const ex=CACHE.asistencias.find(x=>x.tId===t.id&&x.fecha===mFecha);
      if(ex) await updateDoc(doc(db,'asistencias',ex.id),data); else await addDoc(COL.asistencias(),data);
    }
  }
  toast('Marcaciones guardadas');
};

window.openModal=(t,b)=>{document.getElementById('mtitle').textContent=t;document.getElementById('mbody').innerHTML=b;document.getElementById('modal').classList.add('show')};
window.closeModal=()=>document.getElementById('modal').classList.remove('show');

startLS();
</script>
</body>
</html>
