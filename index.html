<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a5c32">
<title>XURI S.A.</title>
<style>
:root{--v:#1a5c32;--vc:#e8f3e8;--r:#c0392b;--a:#d4860b;--az:#1a6fa3;--bg:#f4f6f4;--bd:#dde5dd;--w:#fff;--tx:#1a1a1a;--t2:#5a7a5a;--t3:#9aaa9a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px}
#loader{position:fixed;inset:0;background:var(--v);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:14px}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:.3s;z-index:9999}
#toast.show{opacity:1}#toast.ok{background:var(--v)}
#login{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:100}
.lcard{background:var(--w);border-radius:20px;border:1px solid var(--bd);padding:28px 22px;width:100%;max-width:360px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.rbtn{padding:13px 6px;border-radius:12px;border:2px solid var(--bd);background:#fafcfa;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center}
.rbtn.sel{border-color:var(--v);background:var(--vc)}
.pinw{display:flex;gap:8px;margin-bottom:6px;position:relative}
.pinw input{flex:1;padding:12px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:16px}
#app{display:none;height:100%;flex-direction:column}
#app.show{display:flex}
.hdr{background:var(--v);color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.hrol{font-size:10px;background:rgba(255,255,255,0.2);padding:3px 10px;border-radius:99px}
.bnav{display:flex;background:var(--w);border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom)}
.btab{flex:1;padding:10px 4px;border:none;background:none;display:flex;flex-direction:column;align-items:center;color:var(--t3);font-size:10px;font-weight:600;cursor:pointer}
.btab.act{color:var(--v)}
.pages{flex:1;overflow-y:auto}
.page{display:none;padding:14px}
.page.show{display:block}
.wcard{background:var(--w);border-radius:12px;border:1px solid var(--bd);padding:14px;margin-bottom:10px;display:flex;gap:12px}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;background:var(--vc);color:var(--v)}
.mcard{background:var(--w);border-radius:12px;border:2px solid var(--bd);padding:14px;margin-bottom:8px}
.mcard.pre{border-color:var(--v);background:#f2fbf2}
.mdet{margin-top:12px;display:none;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end}
.mdet.show{display:grid}
.btn{padding:10px 18px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
.bg{background:var(--v);color:#fff}.bgr{background:#eee}.bfull{width:100%}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:4px}
.field input{width:100%;padding:10px;border:1.5px solid var(--bd);border-radius:8px}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.mbg.show{display:flex}
.msheet{background:var(--w);border-radius:20px;width:90%;max-width:450px;padding:20px}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><h2>XURI S.A.</h2></div>
<div id="toast"></div>

<div id="login">
<div class="lcard">
  <div style="text-align:center;margin-bottom:20px"><h1 style="color:var(--v)">Eventuales</h1></div>
  <div class="rgrid">
    <button class="rbtn sel" onclick="selRol('asistente',this)"><span>👩‍💼</span><small>RRHH</small></button>
    <button class="rbtn" onclick="selRol('bodega',this)"><span>📋</span><small>Bodega</small></button>
    <button class="rbtn" onclick="selRol('supervisor',this)"><span>👁️</span><small>Superv.</small></button>
    <button class="rbtn" onclick="selRol('jefe',this)"><span>📊</span><small>Jefe</small></button>
  </div>
  <div class="pinw">
    <input type="password" id="pin" placeholder="Contraseña">
    <button onclick="togPin()" style="position:absolute;right:100px;top:12px;background:none;border:none;cursor:pointer">👁️</button>
    <button class="btn bg" onclick="login()">Entrar</button>
  </div>
  <p id="lerr" style="color:var(--r);font-size:12px;display:none;text-align:center;margin-top:10px">Contraseña incorrecta</p>
</div>
</div>

<div id="app">
  <div class="hdr">
    <div><strong>XURI S.A.</strong></div>
    <div style="display:flex;align-items:center;gap:10px"><span id="hrol" class="hrol"></span><button onclick="location.reload()" style="background:none;border:none;color:#fff;font-weight:bold">Salir</button></div>
  </div>
  <div class="pages" id="pages"></div>
  <nav class="bnav" id="bnav"></nav>
</div>

<div class="mbg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="msheet"><h3 id="mtitle"></h3><div id="mbody" style="margin-top:15px"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FC={apiKey:"AIzaSyCQwdoGTh9_J4YXiU1hBd3mGqJBI72_sBk",authDomain:"marcaciones-eventuales.firebaseapp.com",projectId:"marcaciones-eventuales",storageBucket:"marcaciones-eventuales.firebasestorage.app",messagingSenderId:"147359952515",appId:"1:147359952515:web:93b790a8788db42aec75b6"};
const app=initializeApp(FC); const db=getFirestore(app);
const COL={trabajadores:()=>collection(db,'trabajadores'),asistencias:()=>collection(db,'asistencias')};
const CACHE={trabajadores:[],asistencias:[],loaded:{}};
const CLAVES={asistente:'asist2026',bodega:'bodega2026',supervisor:'super2026',jefe:'xuri2026'};

let ROL=null, rolSel='asistente', tabAct='', mFecha=new Date().toISOString().slice(0,10);

window.togPin=()=>{const i=document.getElementById('pin'); i.type=i.type==='password'?'text':'password'};
window.selRol=(r,b)=>{rolSel=r; document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel')};
window.toast=(m)=>{const e=document.getElementById('toast');e.textContent=m;e.className='show ok';setTimeout(()=>e.className='',2000)};

window.login=()=>{
  if(document.getElementById('pin').value===CLAVES[rolSel]){
    ROL=rolSel; document.getElementById('login').style.display='none'; document.getElementById('app').classList.add('show');
    document.getElementById('hrol').textContent=ROL.toUpperCase(); initApp();
  }else document.getElementById('lerr').style.display='block';
};

const MODS={
  asistente:{tabs:[{id:'t',l:'Personal'}]},
  bodega:{tabs:[{id:'m',l:'Marcación'},{id:'h',l:'Historial'}]},
  supervisor:{tabs:[{id:'v',l:'Vista'}]},
  jefe:{tabs:[{id:'i',l:'Informe'},{id:'p',l:'Personal'}]}
};

function initApp(){
  const m=MODS[ROL];
  document.getElementById('bnav').innerHTML=m.tabs.map(t=>`<button class="btab" id="bt-${t.id}" onclick="setTab('${t.id}')">${t.l}</button>`).join('');
  document.getElementById('pages').innerHTML=m.tabs.map(t=>`<div id="pg-${t.id}" class="page"></div>`).join('');
  setTab(m.tabs[0].id);
}

window.setTab=id=>{
  tabAct=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('act'));
  const el=document.getElementById('pg-'+id); if(el){el.classList.add('show'); document.getElementById('bt-'+id).classList.add('act'); render();}
};

function render(){
  const p=document.getElementById('pg-'+tabAct); if(!p)return;
  if(tabAct==='t'||tabAct==='p') p.innerHTML=`<button class="btn bg bfull" onclick="mTrab()">+ NUEVO</button><br><br>`+CACHE.trabajadores.map(t=>`<div class="wcard"><div class="av">${t.nombres[0]}</div><div style="flex:1"><strong>${t.nombres}</strong><br><small>${t.cedula}</small></div><button class="btn bgr" onclick="mTrab('${t.id}')">Editar</button></div>`).join('');
  if(tabAct==='m') p.innerHTML=renderM();
  if(tabAct==='v') p.innerHTML=`<h3>Personal Activo</h3><br>`+CACHE.trabajadores.map(t=>`<div class="wcard"><div><strong>${t.nombres}</strong><br><small>${t.cedula} - ${t.area}</small></div></div>`).join('');
}

function renderM(){
  return `<div class="card"><div class="field"><label>FECHA</label><input type="date" value="${mFecha}" onchange="mFecha=this.value;render()"></div></div>`+
  CACHE.trabajadores.map(t=>{
    const a=CACHE.asistencias.find(x=>x.tId===t.id && x.fecha===mFecha)||{e:'08:00',s:'18:00',f:false};
    return `<div class="mcard ${a.id?'pre':''}">
      <div style="display:flex;align-items:center;gap:10px"><input type="checkbox" style="width:20px;height:20px" ${a.id?'checked':''} onchange="togM('${t.id}')"><strong>${t.nombres}</strong></div>
      <div class="mdet ${a.id?'show':''}" id="det-${t.id}">
        <div class="field"><label>Entrada</label><input type="time" id="e-${t.id}" value="${a.e}"></div>
        <div class="field"><label>Salida</label><input type="time" id="s-${t.id}" value="${a.s}"></div>
        <div class="field" style="display:flex;align-items:center;gap:5px;justify-content:center"><input type="checkbox" id="f-${t.id}" ${a.f?'checked':''}> <label style="margin:0">Feriado</label></div>
      </div>
    </div>`;
  }).join('')+`<button class="btn bg bfull" onclick="saveM()">GUARDAR MARCACIÓN DEL DÍA</button>`;
}

window.togM=id=>{ document.getElementById('det-'+id).classList.toggle('show'); };
window.saveM=async()=>{
  const ts=CACHE.trabajadores;
  for(let t of ts){
    if(document.getElementById('det-'+t.id).classList.contains('show')){
      const d={tId:t.id,fecha:mFecha,e:document.getElementById('e-'+t.id).value,s:document.getElementById('s-'+t.id).value,f:document.getElementById('f-'+t.id).checked,_ts:serverTimestamp()};
      const ex=CACHE.asistencias.find(x=>x.tId===t.id&&x.fecha===mFecha);
      if(ex) await updateDoc(doc(db,'asistencias',ex.id),d); else await addDoc(COL.asistencias(),d);
    }
  }
  toast('Guardado'); render();
};

window.mTrab=(id)=>{
  const t=id?CACHE.trabajadores.find(x=>x.id===id):{nombres:'',cedula:'',area:'BODEGA'};
  openModal(id?'Editar':'Nuevo', `<div class="field"><label>Nombre</label><input id="tn" value="${t.nombres}"></div><br><div class="field"><label>Cédula</label><input id="tc" value="${t.cedula}"></div><br><div class="field"><label>Área</label><input id="ta" value="${t.area}"></div><br><button class="btn bg bfull" onclick="saveT('${id||''}')">GUARDAR</button>`);
};
window.saveT=async(id)=>{
  const d={nombres:document.getElementById('tn').value,cedula:document.getElementById('tc').value,area:document.getElementById('ta').value,estado:'activo',_ts:serverTimestamp()};
  if(id) await updateDoc(doc(db,'trabajadores',id),d); else await addDoc(COL.trabajadores(),d);
  closeModal(); toast('Éxito'); render();
};
window.openModal=(t,b)=>{document.getElementById('mtitle').textContent=t;document.getElementById('mbody').innerHTML=b;document.getElementById('modal').classList.add('show')};
window.closeModal=()=>document.getElementById('modal').classList.remove('show');

function startLS(){
  onSnapshot(query(COL.trabajadores(),orderBy('_ts','desc')),s=>{CACHE.trabajadores=s.docs.map(d=>({...d.data(),id:d.id})); document.getElementById('loader').style.display='none'; if(ROL)render();});
  onSnapshot(COL.asistencias(),s=>{CACHE.asistencias=s.docs.map(d=>({...d.data(),id:d.id})); if(ROL)render();});
}
startLS();
</script>
</body>
</html>
