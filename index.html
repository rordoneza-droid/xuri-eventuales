<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a5c32">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>XURI S.A. - Control</title>
<style>
:root{--v:#1a5c32;--vc:#e8f3e8;--r:#c0392b;--bg:#f4f6f4;--bd:#dde5dd;--w:#fff;--tx:#1a1a1a;--t2:#5a7a5a;--t3:#9aaa9a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;height:100vh;display:flex;flex-direction:column}
#loader{position:fixed;inset:0;background:var(--v);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:15px}
.spin{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 25px;border-radius:10px;display:none;z-index:10000}
#login{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:var(--w);padding:30px;border-radius:20px;width:100%;max-width:380px;box-shadow:0 10px 25px rgba(0,0,0,0.1);border:1px solid var(--bd)}
.llogo{text-align:center;margin-bottom:25px}
.llogo h1{color:var(--v);font-size:32px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.rbtn{padding:20px 10px;border-radius:15px;border:2px solid var(--bd);background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px}
.rbtn.sel{border-color:var(--v);background:var(--vc)}
.rico{font-size:35px}
.rlbl{font-size:12px;font-weight:bold}
.pin-box{display:flex;gap:10px}
.pin-box input{flex:1;padding:15px;border:1px solid var(--bd);border-radius:12px;font-size:18px;text-align:center}
#app{display:none;flex:1;flex-direction:column}
.hdr{background:var(--v);color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center}
.pages{flex:1;overflow-y:auto;padding:15px}
.page{display:none}
.page.active{display:block}
.bnav{background:var(--w);border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.btab{flex:1;padding:15px;border:none;background:none;text-align:center;color:var(--t3);font-weight:bold;cursor:pointer}
.btab.act{color:var(--v);border-top:3px solid var(--v)}
.wcard{background:var(--w);padding:15px;border-radius:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bd)}
.mcard{background:var(--w);padding:15px;border-radius:15px;border:2px solid var(--bd);margin-bottom:12px}
.mcard.presente{border-color:var(--v);background:var(--vc)}
.btn{padding:15px;border-radius:12px;border:none;font-weight:bold;cursor:pointer;text-align:center}
.bg{background:var(--v);color:#fff;width:100%}
.bgr{background:#eee;color:#333}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;margin-bottom:5px;font-weight:bold;color:var(--t2)}
.field input, .field select{width:100%;padding:12px;border:1px solid var(--bd);border-radius:8px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;padding:20px;z-index:2000}
.modal-content{background:#fff;padding:25px;border-radius:20px;width:100%;max-width:400px}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><h2>Cargando XURI...</h2></div>
<div id="toast"></div>

<div id="login">
    <div class="lcard">
        <div class="llogo"><h1>XURI S.A.</h1><p>Control de Asistencia</p></div>
        <div class="rgrid">
            <button type="button" class="rbtn sel" onclick="selRol('asistente', this)"><span class="rico">👩‍💼</span><span class="rlbl">Asistente</span></button>
            <button type="button" class="rbtn" onclick="selRol('bodega', this)"><span class="rico">📦</span><span class="rlbl">Bodega</span></button>
            <button type="button" class="rbtn" onclick="selRol('supervisor', this)"><span class="rico">👷</span><span class="rlbl">Supervisor</span></button>
            <button type="button" class="rbtn" onclick="selRol('jefe', this)"><span class="rico">📊</span><span class="rlbl">Jefe RRHH</span></button>
        </div>
        <div class="pin-box">
            <input type="password" id="pin" placeholder="PIN de acceso">
            <button type="button" class="btn bg" onclick="login()" style="width:auto">Entrar</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="hdr">
        <span id="txtRol" style="font-weight:bold;text-transform:uppercase"></span>
        <button type="button" onclick="location.reload()" class="btn bgr" style="padding:5px 10px;font-size:12px">Salir</button>
    </div>
    <div id="pages" class="pages"></div>
    <nav id="bnav" class="bnav"></nav>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="mTitle" style="margin-bottom:15px"></h3>
        <div id="mBody"></div>
        <button type="button" class="btn bgr" onclick="closeModal()" style="width:100%;margin-top:10px">Cerrar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {apiKey: "AIzaSyCQwdoGTh9_J4YXiU1hBd3mGqJBI72_sBk", authDomain: "marcaciones-eventuales.firebaseapp.com", projectId: "marcaciones-eventuales", storageBucket: "marcaciones-eventuales.firebasestorage.app", messagingSenderId: "147359952515", appId: "1:147359952515:web:93b790a8788db42aec75b6"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let ROL = null;
let rolSeleccionado = 'asistente';
let trabajadores = [];
let asistencias = [];
let fechaFiltro = new Date().toISOString().split('T')[0];

const CLAVES = { asistente: 'asist2026', bodega: 'bodega2026', supervisor: 'super2026', jefe: 'xuri2026' };

// --- LOGIN ---
window.selRol = (r, btn) => {
    rolSeleccionado = r;
    document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
};

window.login = () => {
    const pin = document.getElementById('pin').value;
    if (pin === CLAVES[rolSeleccionado]) {
        ROL = rolSeleccionado;
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('txtRol').textContent = ROL;
        renderNav();
    } else {
        alert("PIN incorrecto");
    }
};

// --- NAVEGACIÓN ---
const menus = {
    asistente: [{id:'lista', n:'Personal', icon:'👥'}],
    bodega: [{id:'marcar', n:'Asistencia', icon:'📝'}],
    supervisor: [{id:'ver', n:'Estado', icon:'👁️'}],
    jefe: [{id:'lista', n:'Personal', icon:'👥'}, {id:'reporte', n:'Reportes', icon:'📊'}]
};

function renderNav() {
    const nav = document.getElementById('bnav');
    nav.innerHTML = menus[ROL].map(m => `<button type="button" class="btab" onclick="setTab('${m.id}')">${m.icon}<br>${m.n}</button>`).join('');
    setTab(menus[ROL][0].id);
}

window.setTab = (id) => {
    document.querySelectorAll('.btab').forEach((b, i) => b.classList.toggle('act', menus[ROL][i].id === id));
    renderPage(id);
};

function renderPage(id) {
    const cont = document.getElementById('pages');
    if (id === 'lista') {
        cont.innerHTML = `<button type="button" class="btn bg" onclick="formTrab()">+ NUEVO TRABAJADOR</button><br><br>` + 
        trabajadores.map(t => `<div class="wcard">
            <div><b>${t.nombres}</b><br><small>${t.cedula} | ${t.area}</small></div>
            <button type="button" class="btn bgr" onclick="formTrab('${t.id}')">Editar</button>
        </div>`).join('');
    } else if (id === 'marcar') {
        cont.innerHTML = `<div class="field"><label>Fecha de trabajo</label><input type="date" value="${fechaFiltro}" onchange="cambiarFecha(this.value)"></div>` +
        trabajadores.map(t => {
            const asis = asistencias.find(a => a.tId === t.id && a.fecha === fechaFiltro);
            return `<div class="mcard ${asis ? 'presente' : ''}">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-size:18px"><b>${t.nombres}</b></span>
                    <button type="button" class="btn ${asis ? 'bgr' : 'bg'}" onclick="marcarAsis('${t.id}')">${asis ? 'QUITAR' : 'MARCAR'}</button>
                </div>
                ${asis ? `<div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <small>E: ${asis.hEntrada}</small> <small>S: ${asis.hSalida}</small>
                </div>` : ''}
            </div>`;
        }).join('');
    } else {
        cont.innerHTML = `<p style="text-align:center; padding:20px">Módulo en construcción o vista de consulta.</p>`;
    }
}

// --- ACCIONES FIREBASE ---
window.formTrab = (id = null) => {
    const t = id ? trabajadores.find(x => x.id === id) : {nombres:'', cedula:'', area:''};
    const title = id ? 'Editar Trabajador' : 'Nuevo Trabajador';
    const body = `
        <div class="field"><label>Nombres Completos</label><input type="text" id="fNom" value="${t.nombres}"></div>
        <div class="field"><label>Cédula</label><input type="number" id="fCed" value="${t.cedula}"></div>
        <div class="field"><label>Área</label>
            <select id="fArea">
                <option ${t.area==='BODEGA'?'selected':''}>BODEGA</option>
                <option ${t.area==='PRODUCCION'?'selected':''}>PRODUCCION</option>
                <option ${t.area==='LIMPIEZA'?'selected':''}>LIMPIEZA</option>
            </select>
        </div>
        <button type="button" class="btn bg" onclick="guardarTrab('${id||''}')">GUARDAR DATOS</button>
    `;
    openModal(title, body);
};

window.guardarTrab = async (id) => {
    const data = {
        nombres: document.getElementById('fNom').value.toUpperCase(),
        cedula: document.getElementById('fCed').value,
        area: document.getElementById('fArea').value,
        _ts: serverTimestamp()
    };
    if (id) await updateDoc(doc(db, 'trabajadores', id), data);
    else await addDoc(collection(db, 'trabajadores'), data);
    closeModal();
    alert("¡Guardado correctamente!");
};

window.marcarAsis = async (tId) => {
    const ex = asistencias.find(a => a.tId === tId && a.fecha === fechaFiltro);
    if (ex) {
        // Lógica para quitar si fuera necesario (deleteDoc) o simplemente informar
        alert("Ya está marcado para esta fecha.");
    } else {
        await addDoc(collection(db, 'asistencias'), {
            tId, fecha: fechaFiltro, hEntrada: '08:00', hSalida: '18:00', _ts: serverTimestamp()
        });
        alert("Asistencia registrada");
    }
};

window.cambiarFecha = (v) => { fechaFiltro = v; renderPage('marcar'); };

// --- MODAL Y UI ---
window.openModal = (t, b) => { 
    document.getElementById('mTitle').textContent = t; 
    document.getElementById('mBody').innerHTML = b; 
    document.getElementById('modal').style.display = 'flex'; 
};
window.closeModal = () => { document.getElementById('modal').style.display = 'none'; };

// --- CARGA INICIAL ---
function init() {
    onSnapshot(query(collection(db, 'trabajadores'), orderBy('_ts', 'desc')), snap => {
        trabajadores = snap.docs.map(d => ({id: d.id, ...d.data()}));
        document.getElementById('loader').style.display = 'none';
        if (ROL) renderPage('lista');
    });
    onSnapshot(collection(db, 'asistencias'), snap => {
        asistencias = snap.docs.map(d => ({id: d.id, ...d.data()}));
        if (ROL) renderPage('marcar');
    });
}

init();
</script>
</body>
</html>
