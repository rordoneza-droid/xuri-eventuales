<style>

#app{display:none;height:100%;flex-direction:column}

.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;font-family:inherit;color:var(--tx);background:var(--w);-webkit-appearance:none}

.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bg{background:var(--v);color:#fff}
.br{background:var(--r);color:#fff}
.bo{background:var(--a);color:#fff}
.bb{background:var(--az);color:#fff}
.bgr{background:#f0f4f0;color:#444;border:1px solid var(--bd)}
.bsm{padding:6px 12px;font-size:12px;min-height:32px}
.bfull{width:100%}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bdg{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.bdg-g{background:#d4edda;color:#155724}
.bdg-b{background:#d0e8f5;color:#0c4a6e}
.bdg-r{background:#fde8e4;color:#7b1d1d}
.bdg-o{background:#fef3e2;color:#7d4e00}
.bdg-gr{background:#e8ebe8;color:#444}
.wcard{background:var(--w);border-radius:12px;border:1px solid var(--bd);padding:14px;margin-bottom:10px;display:flex;gap:12px}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.av-g{background:#c8f0d0;color:var(--v)}
.av-b{background:#d0e8f5;color:#0c4a6e}
.av-r{background:#fde8e4;color:var(--r)}
.av-k{background:#e8ebe8;color:#444}
.winfo{flex:1;min-width:0}
.wname{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wsub{font-size:12px;color:var(--t2);margin-top:2px}
.wtiny{font-size:11px;color:var(--t3);margin-top:2px}
.wact{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.mcard{background:var(--w);border-radius:12px;border:2px solid var(--bd);padding:14px;margin-bottom:8px;transition:.15s}
.mcard.pre{border-color:#2d8a2d;background:#f2fbf2}
.mtop{display:flex;align-items:center;gap:12px}
.mchk{width:30px;height:30px;border-radius:8px;border:2px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--w);font-size:16px;transition:.15s;user-select:none}
.mchk.on{background:var(--v);border-color:var(--v);color:#fff}
.mname{font-weight:700;font-size:14px;flex:1}
.marea{font-size:11px;color:var(--t2)}
.mdet{margin-top:12px;display:none;flex-direction:column;gap:8px}
.mdet.show{display:flex}
.mtimes{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mpago{font-size:16px;font-weight:800;color:var(--v)}
.matr{font-size:12px;color:var(--r);font-weight:700}
.ncard{background:var(--w);border-radius:12px;border:1.5px solid #fde8e4;padding:14px;margin-bottom:10px}
.cal-wrap{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.cal-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--bd);background:#fafcfa;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:.12s}
.cal-btn.sel{background:var(--a);border-color:var(--a);color:#fff}
.iwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:1px solid var(--bd);margin-bottom:12px}
.iwrap table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
.iwrap th{background:#f0f4f0;padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t2);border-bottom:1px solid var(--bd);white-space:nowrap}
.iwrap td{padding:8px 10px;border-bottom:1px solid #f4f6f4;vertical-align:middle}
.iwrap tr:last-child td{border-bottom:none}
.iwrap tr.tot td{background:var(--v);color:#fff;font-weight:700;border:none}
.tr{text-align:right;font-variant-numeric:tabular-nums}
.tc{text-align:center}
.dc{color:var(--r);font-weight:700}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--w);border-radius:8px;border:1px solid var(--bd);padding:10px;text-align:center}
.snum{font-size:20px;font-weight:800;color:var(--v)}
.slbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.ihdr{background:var(--v);color:#fff;border-radius:12px 12px 0 0;padding:14px 16px}
.ihdr .iemp{font-size:9px;opacity:.7;letter-spacing:.12em;text-transform:uppercase}
.ihdr h3{font-size:16px;font-weight:700;margin:2px 0}
.ihdr .iper{font-size:12px;opacity:.8}
.pchip{background:var(--vc);border:1px solid #b8d8b8;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.pdates{font-weight:700;font-size:13px;color:var(--v)}
.parea{font-size:12px;color:var(--t2);margin-top:2px}
.nbaja{background:#fef3e2;border:1px solid #f5d89a;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#7d4e00}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
.mbg.show{display:flex}
.msheet{background:var(--w);border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);animation:sup .25s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mpull{width:36px;height:4px;background:var(--bd);border-radius:99px;margin:10px auto 4px}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 12px}
.mhdr h3{font-size:16px;font-weight:700}
.mclose{background:none;border:none;font-size:24px;cursor:pointer;color:var(--t3);line-height:1}
.mbody{padding:0 18px 18px}
.sep{height:1px;background:var(--bd);margin:12px 0}
.chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:var(--vc);color:var(--v)}
.alerto{background:#fef3e2;border:1px solid #f5d89a;border-radius:8px;padding:10px 12px;font-size:12px;color:#7d4e00;margin-bottom:10px}
.empty{text-align:center;color:var(--t3);padding:32px 16px;font-size:13px}
@media(min-width:700px){.page{max-width:720px;margin:0 auto;padding:20px}.fg2{grid-template-columns:1fr 1fr}.srow{grid-template-columns:repeat(4,1fr)}.mtimes{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><h2>XURI S.A.</h2><p style="font-size:13px;opacity:.7">Conectando...</p></div>
<div id="toast"></div>
<div id="login">
<div class="lcard">
  <div class="llogo"><div class="emp">XURI S.A.</div><h1>Eventuales</h1><p>Control de trabajadores eventuales</p></div>
  <div class="rgrid">
    <button class="rbtn sel" onclick="selRol('asistente',this)"><span class="rico">&#x1F469;&#x200D;&#x1F4BC;</span><span class="rlbl">Asistente RRHH</span><span class="rsub">Registra personas</span></button>
    <button class="rbtn" onclick="selRol('bodega',this)"><span class="rico">&#x1F4CB;</span><span class="rlbl">Jefe Bodega</span><span class="rsub">Marcacion diaria</span></button>
    <button class="rbtn" onclick="selRol('supervisor',this)"><span class="rico">&#x1F441;&#xFE0F;</span><span class="rlbl">Supervisor</span><span class="rsub">Solo visualiza</span></button>
    <button class="rbtn" onclick="selRol('jefe',this)"><span class="rico">&#x1F4CA;</span><span class="rlbl">Jefe RRHH</span><span class="rsub">Informes y pagos</span></button>
  </div>
  <div class="pinw"><input type="password" id="pin" placeholder="Contrasena" onkeydown="if(event.key==='Enter')login()"><button class="btn bg" onclick="login()">Entrar</button></div>
  <div class="lerr" id="lerr">Contrasena incorrecta</div>
</div>
</div>
<div id="app">
  <div class="hdr"><div class="hdri">
    <div class="hbrand"><span class="hemp">XURI S.A.</span><span class="hmod">Control de Eventuales</span></div>
    <div class="hright"><span class="sdot" id="sdot"></span><span class="hrol" id="hrol"></span><button class="bout" onclick="logout()">Salir</button></div>
  </div></div>
  <div class="pages" id="pages"></div>
  <nav class="bnav" id="bnav"></nav>
</div>
<div class="mbg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="msheet"><div class="mpull"></div>
    <div class="mhdr"><h3 id="mtitle"></h3><button class="mclose" onclick="closeModal()">x</button></div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,addDoc,updateDoc,deleteDoc,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const FC={apiKey:"AIzaSyCQwdoGTh9_J4YXiU1hBd3mGqJBI72_sBk",authDomain:"marcaciones-eventuales.firebaseapp.com",projectId:"marcaciones-eventuales",storageBucket:"marcaciones-eventuales.firebasestorage.app",messagingSenderId:"147359952515",appId:"1:147359952515:web:93b790a8788db42aec75b6"};
const fbA=initializeApp(FC);
const db=getFirestore(fbA);
const COL={trabajadores:()=>collection(db,'trabajadores'),asistencias:()=>collection(db,'asistencias'),listaNegra:()=>collection(db,'listaNegra'),periodos:()=>collection(db,'periodos')};
const CACHE={trabajadores:[],asistencias:[],listaNegra:[],periodos:[],_loaded:{}};
const AREAS=['BODEGA','COSECHA','EMPAQUE','RIEGO','FUMIGACION','MANTENIMIENTO','ADMINISTRACION','OTRO'];
const CARGOS=['AYUDANTE SERV. GENERALES','ASISTENTE SERV. GENERALES','OPERADOR DE MAQUINARIA','SUPERVISOR DE AREA','AUXILIAR DE BODEGA','JORNALERO','OTRO'];
const BANCOS=['Banco Pichincha','Banco Guayaquil','Banco del Pacifico','Produbanco','Banco Internacional','BanEcuador','Cooperativa JEP','Otro'];
const CLAVES={asistente:'asist2026',bodega:'bodega2026',supervisor:'super2026',jefe:'xuri2026'};
function hoy(){return new Date().toISOString().slice(0,10)}
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function fmtF(iso){if(!iso)return'--';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y}
function fmtFL(iso){if(!iso)return'--';return new Date(iso+'T12:00:00').toLocaleDateString('es-EC',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function inic(n){return n.trim().split(' ').filter(Boolean).slice(0,2).map(x=>x[0].toUpperCase()).join('')}
function toast(msg,tipo='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+tipo;clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2800)}
function calcP(fecha,entrada,salida,feriado){
  const d=new Date(fecha+'T12:00:00');const dow=d.getDay();const fin=dow===0||dow===6;
  const tar=(fin||feriado)?25:20;const th=tar/9;
  const eM=toMin(entrada),sM=toMin(salida),ref=toMin('08:00');
  const trab=Math.max(0,sM-Math.max(eM,ref));const ef=Math.max(0,trab-60);const h=ef/60;
  const pago=Math.min(tar,h*th);const aH=(Math.max(0,eM-ref))/60;const dV=aH*th;
  return{pago:Math.round(pago*100)/100,horas:Math.round(h*10)/10,tarifa:tar,fin,feriado,atrasoH:Math.round(aH*10)/10,descVal:Math.round(dV*100)/100};
}
function resT(tId,desde,hasta){
  const as=CACHE.asistencias.filter(a=>{if(a.tId!==tId)return false;if(desde&&a.fecha<desde)return false;if(hasta&&a.fecha>hasta)return false;return true;});
  let p=0,d=as.length,aH=0,dV=0;
  as.forEach(a=>{const c=calcP(a.fecha,a.entrada,a.salida,a.feriado);p+=c.pago;aH+=c.atrasoH;dV+=c.descVal;});
  return{pago:Math.round(p*100)/100,dias:d,atrasoH:Math.round(aH*10)/10,descVal:Math.round(dV*100)/100};
}
async function fadd(col,data){return await addDoc(COL[col](),{...data,_ts:serverTimestamp()})}
async function fupd(col,id,data){return await updateDoc(doc(db,col,id),data)}
async function fdel(col,id){return await deleteDoc(doc(db,col,id))}
let uns=[];
function startLS(){
  uns.forEach(u=>u());uns=[];
  const cols = ['trabajadores','asistencias','listaNegra','periodos'];
  cols.forEach(col=>{
    const u=onSnapshot(query(COL[col](),orderBy('_ts','asc')),snap=>{
      CACHE[col]=snap.docs.map(d=>({...d.data(),id:d.id}));
      CACHE._loaded[col]=true;
      if(document.getElementById('sdot')) document.getElementById('sdot').style.background='#4ade80';
      const allLoaded = cols.filter(c => CACHE._loaded[c]).length === 4;
      if(allLoaded){
        document.getElementById('loader').style.display='none';
        document.getElementById('login').style.display='flex';
      }
      if(ROL)setTab(tabActual);
    },(err)=>{
      console.error(err);
      if(document.getElementById('sdot')) document.getElementById('sdot').style.background='#f87171';
    });
    uns.push(u);
  });
}
function openModal(t,h){document.getElementById('mtitle').textContent=t;document.getElementById('mbody').innerHTML=h;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
window.closeModal=closeModal;
let ROL=null,rolSel='asistente',tabActual='';
const MODS={
  asistente:{lbl:'Asistente RRHH',tabs:[{id:'trabajadores',ico:'T',lbl:'Trabajadores'},{id:'estados',ico:'R',lbl:'Estados'},{id:'lnegra',ico:'N',lbl:'Lista negra'}]},
  bodega:{lbl:'Jefe Bodega',tabs:[{id:'marcacion',ico:'M',lbl:'Marcacion'},{id:'historial',ico:'H',lbl:'Historial'},{id:'bajas',ico:'B',lbl:'Bajas'}]},
  supervisor:{lbl:'Supervisor',tabs:[{id:'sv_vista',ico:'V',lbl:'Vista'},{id:'sv_periodos',ico:'P',lbl:'Periodos'}]},
  jefe:{lbl:'Jefe RRHH',tabs:[{id:'informe',ico:'I',lbl:'Informe'},{id:'transferencias',ico:'$',lbl:'Pagos'},{id:'personal',ico:'T',lbl:'Personal'},{id:'jlnegra',ico:'N',lbl:'Negra'}]}
};
function selRol(r,btn){rolSel=r;document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');document.getElementById('pin').value='';document.getElementById('lerr').style.display='none';}
window.selRol=selRol;
function login(){
  const pin=document.getElementById('pin').value.trim();
  if(pin===CLAVES[rolSel]){ROL=rolSel;document.getElementById('login').style.display='none';document.getElementById('app').classList.add('show');document.getElementById('hrol').textContent=MODS[ROL].lbl;initApp();}
  else{document.getElementById('lerr').style.display='block';document.getElementById('pin').value='';}
}
window.login=login;
function logout(){ROL=null;tabActual='';document.getElementById('app').classList.remove('show');document.getElementById('login').style.display='flex';document.getElementById('pin').value='';}
window.logout=logout;
function initApp(){

    await Promise.all(act.filter(t=>mMap[t.id]?.presente).map(t=>{
      const en=document.getElementById('ment-'+t.id)?.value||mMap[t.id].entrada;
      const sa=document.getElementById('msal-'+t.id)?.value||mMap[t.id].salida;
      const fe=document.getElementById('mfer-'+t.id)?.checked||false;
      const ob=document.getElementById('mobs-'+t.id)?.value||'';
      n++;return fadd('asistencias',{tId:t.id,fecha:mFecha,entrada:en,salida:sa,feriado:fe,obs:ob});
    }));
    toast('Marcacion guardada: '+n+' persona'+(n!==1?'s':''));

  openModal('Editar - '+(t?.nombres||''),'<div class="fg fg2" style="margin-bottom:10px"><div class="field"><label>Fecha</label><input type="date" id="ef" value="'+a.fecha+'"></div><div class="field"><label>Entrada</label><input type="time" id="ee" value="'+a.entrada+'"></div></div><div class="fg fg2" style="margin-bottom:10px"><div class="field"><label>Salida</label><input type="time" id="es" value="'+a.salida+'"></div><div class="field"><label>Feriado</label><select id="efer"><option value="0"'+(!a.feriado?' selected':'')+'>No</option><option value="1"'+(a.feriado?' selected':'')+'>Si</option></select></div></div><div class="field" style="margin-bottom:14px"><label>Observacion</label><input id="eobs" value="'+(a.obs||'')+'"></div><div class="brow" style="justify-content:flex-end"><button class="btn bgr" onclick="closeModal()">Cancelar</button><button class="btn bg" onclick="gEdA(\''+id+'\')">Guardar</button></div>');

window.mEdA=mEdA;
async function gEdA(id){await fupd('asistencias',id,{fecha:document.getElementById('ef').value,entrada:document.getElementById('ee').value,salida:document.getElementById('es').value,feriado:document.getElementById('efer').value==='1',obs:document.getElementById('eobs').value});closeModal();toast('Asistencia actualizada correctamente');}
window.gEdA=gEdA;

function rSV(){
  const act=CACHE.trabajadores.filter(t=>t.estado==='activo').length;
  let tP=0;CACHE.asistencias.forEach(a=>{tP+=calcP(a.fecha,a.entrada,a.salida,a.feriado).pago;});
  const pa=AREAS.map(a=>({a,n:CACHE.trabajadores.filter(t=>t.area===a&&t.estado==='activo').length})).filter(x=>x.n>0);
  pg('sv_vista','<div class="stit" style="margin-bottom:12px">Vista general</div><div class="srow"><div class="stat"><div class="snum">'+act+'</div><div class="slbl">Activos</div></div><div class="stat"><div class="snum">'+CACHE.asistencias.length+'</div><div class="slbl">Dias marcados</div></div><div class="stat"><div class="snum">$'+tP.toFixed(0)+'</div><div class="slbl">Total acum.</div></div></div>'+
  '<div class="card"><div class="stit" style="margin-bottom:10px">Por area</div>'+pa.map(x=>'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px"><span class="chip">'+x.a+'</span><strong>'+x.n+' persona'+(x.n!==1?'s':'')+'</strong></div>').join('')+'</div>'+
  '<div class="card"><div class="stit" style="margin-bottom:10px">Ultimas marcaciones</div>'+[...CACHE.asistencias].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,8).map(a=>{const t=CACHE.trabajadores.find(x=>x.id===a.tId);if(!t)return'';const c=calcP(a.fecha,a.entrada,a.salida,a.feriado);return'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px"><div><strong>'+t.nombres+'</strong><div style="color:var(--t3)">'+fmtF(a.fecha)+(c.atrasoH>0?' - <span style="color:var(--r)">atraso '+c.atrasoH+'h</span>':'')+'</div></div><strong>$'+c.pago.toFixed(2)+'</strong></div>';}).join('')+'</div>');
}
function rSVP(){
  pg('sv_periodos','<div class="shdr"><div class="stit">Periodos autorizados</div><button class="btn bg bsm" onclick="mPer(null)">+ Nuevo</button></div>'+
  (CACHE.periodos.map(p=>'<div class="pchip"><div class="pdates">'+fmtF(p.desde)+' a '+fmtF(p.hasta)+'</div><div class="parea"><span class="chip">'+(p.area||'Todas las areas')+'</span>'+(p.obs?' - '+p.obs:'')+'</div><div style="margin-top:8px" class="brow"><button class="btn bgr bsm" onclick="mPer(\''+p.id+'\')">Editar</button><button class="btn br bsm" onclick="mBorr(\'periodo\',\''+p.id+'\')">Eliminar</button></div></div>').join('')||'<div class="empty">Sin periodos</div>'));

function mPer(id){
  const p=id?CACHE.periodos.find(x=>x.id===id):{area:'',desde:hoy(),hasta:hoy(),obs:''};
  openModal(id?'Editar periodo':'Nuevo periodo autorizado','<div class="fg fg2" style="margin-bottom:10px"><div class="field"><label>Desde *</label><input type="date" id="pd" value="'+p.desde+'"></div><div class="field"><label>Hasta *</label><input type="date" id="ph" value="'+p.hasta+'"></div></div><div class="field" style="margin-bottom:10px"><label>Area</label><select id="pa"><option value="">Todas</option>'+selOpts(AREAS,p.area)+'</select></div><div class="field" style="margin-bottom:14px"><label>Observacion</label><input id="po" value="'+(p.obs||'')+'"></div><div class="brow" style="justify-content:flex-end"><button class="btn bgr" onclick="closeModal()">Cancelar</button><button class="btn bg" onclick="gPer(\''+( id||'')+'\')">Guardar</button></div>');
}
window.mPer=mPer;
async function gPer(id){
  const d={area:document.getElementById('pa').value,desde:document.getElementById('pd').value,hasta:document.getElementById('ph').value,obs:document.getElementById('po').value};
  if(!d.desde||!d.hasta){toast('Fechas obligatorias','err');return}
  if(id){await fupd('periodos',id,d);toast('Periodo actualizado');}else{await fadd('periodos',d);toast('Periodo registrado correctamente');}
  closeModal();
}
window.gPer=gPer;

let iD='',iH='',iA='';
function rInf(){
  const n=new Date();if(!iD)iD=new Date(n.getFullYear(),n.getMonth(),1).toISOString().slice(0,10);if(!iH)iH=hoy();
  pg('informe','<div class="stit" style="margin-bottom:12px">Informe por periodo</div><div class="card"><div class="fg fg2" style="margin-bottom:10px"><div class="field"><label>Desde</label><input type="date" id="id" value="'+iD+'" onchange="iD=this.value"></div><div class="field"><label>Hasta</label><input type="date" id="ih" value="'+iH+'" onchange="iH=this.value"></div></div><div class="field" style="margin-bottom:12px"><label>Area</label><select id="ia" onchange="iA=this.value"><option value="">Todas las areas</option>'+selOpts(AREAS,iA)+'</select></div><button class="btn bg bfull" onclick="genInf()">Generar informe</button></div><div id="inf-res"></div>');
}
window.genInf=function(){
  const desde=document.getElementById('id').value,hasta=document.getElementById('ih').value,area=document.getElementById('ia').value;
  iD=desde;iH=hasta;iA=area;
  const tr=CACHE.trabajadores.filter(t=>!area||t.area===area);
  let tD=0,tP=0,tDes=0,n=0;
  const fi=tr.map(t=>{const r=resT(t.id,desde,hasta);if(!r.dias)return'';n++;tD+=r.dias;tP+=r.pago;tDes+=r.descVal;
    return'<tr><td class="tc">'+n+'</td><td><strong>'+t.nombres+'</strong></td><td style="font-family:monospace;font-size:11px">'+t.cedula+'</td><td style="font-size:11px">'+t.cargo+'</td><td style="white-space:nowrap">'+fmtF(t.fechaIngreso)+'</td><td class="tc">240</td><td><span class="chip">'+t.area+'</span></td><td class="tr">$20.00</td><td class="tc">'+r.dias+'</td><td class="tr'+(r.descVal>0?' dc':'')+'">'+( r.atrasoH>0?r.atrasoH+'h -$'+r.descVal.toFixed(2):'--')+'</td><td class="tr"><strong>$'+r.pago.toFixed(2)+'</strong></td></tr>';}).filter(Boolean);
  if(!fi.length){document.getElementById('inf-res').innerHTML='<div class="empty">Sin registros para ese periodo</div>';return}
  const d1=new Date(desde+'T12:00:00'),d2=new Date(hasta+'T12:00:00');
  const per=d1.toLocaleDateString('es-EC',{day:'numeric',month:'long',year:'numeric'})+' al '+d2.toLocaleDateString('es-EC',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('inf-res').innerHTML='<div class="ihdr"><div class="iemp">XURI S.A. - Nomina mensual</div><h3>Trabajadores Eventuales</h3><div class="iper">'+per+(area?' - '+area:'')+'</div></div><div class="iwrap"><table><thead><tr><th>N</th><th>Nombres</th><th>Cedula</th><th>Cargo</th><th>F.Ingreso</th><th>Jornada</th><th>Area</th><th>S.Diario</th><th>Dias</th><th>Atrasos/Desc</th><th>Total</th></tr></thead><tbody>'+fi.join('')+'<tr class="tot"><td colspan="8" style="text-align:right;padding-right:12px">TOTALES</td><td class="tc">'+tD+'</td><td class="tr">'+(tDes>0?'-$'+tDes.toFixed(2):'--')+'</td><td class="tr">$'+tP.toFixed(2)+'</td></tr></tbody></table></div><button class="btn bb" onclick="impr(\'nomina\',\''+desde+'\',\''+hasta+'\',\''+area+'\')">Imprimir nomina</button>';
};
function rTrans(){
  const n=new Date();if(!iD)iD=new Date(n.getFullYear(),n.getMonth(),1).toISOString().slice(0,10);if(!iH)iH=hoy();
  pg('transferencias','<div class="stit" style="margin-bottom:12px">Detalle para transferencias</div><div class="card"><div class="fg fg2" style="margin-bottom:10px"><div class="field"><label>Desde</label><input type="date" id="td" value="'+iD+'" onchange="iD=this.value"></div><div class="field"><label>Hasta</label><input type="date" id="th2" value="'+iH+'" onchange="iH=this.value"></div></div><button class="btn bg bfull" onclick="genTrans()">Generar detalle</button></div><div id="trans-res"></div>');
}
window.genTrans=function(){
  const desde=document.getElementById('td').value,hasta=document.getElementById('th2').value;
  iD=desde;iH=hasta;
  let tot=0;const conC=[],sinC=[];
  CACHE.trabajadores.forEach(t=>{const r=resT(t.id,desde,hasta);if(!r.dias)return;if(!t.cuenta)sinC.push({t,r});else{conC.push({t,r});tot+=r.pago;}});
  if(!conC.length&&!sinC.length){document.getElementById('trans-res').innerHTML='<div class="empty">Sin registros para ese periodo</div>';return}
  document.getElementById('trans-res').innerHTML='<div style="background:var(--vc);border:1px solid #b8d8b8;border-radius:12px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;color:var(--v)">'+conC.length+' transferencia'+(conC.length!==1?'s':'')+'</span><span style="font-size:20px;font-weight:800;color:var(--v)">$'+tot.toFixed(2)+'</span></div>'+
  (sinC.length?'<div class="alerto" style="margin-bottom:10px"><strong>Sin cuenta ('+sinC.length+'):</strong> '+sinC.map(f=>f.t.nombres).join(', ')+'</div>':'')+
  '<div class="iwrap"><table><thead><tr><th>Nombres</th><th>Cedula</th><th>Banco</th><th>Tipo</th><th># Cuenta</th><th>Dias</th><th>Total</th></tr></thead><tbody>'+
  conC.map(({t,r})=>'<tr><td><strong>'+t.nombres+'</strong></td><td style="font-family:monospace;font-size:11px">'+t.cedula+'</td><td style="font-size:11px">'+( t.banco||'--')+'</td><td style="font-size:11px">'+(t.tipoCuenta||'--')+'</td><td style="font-family:monospace;font-size:11px">'+t.cuenta+'</td><td class="tc">'+r.dias+'</td><td class="tr"><strong>$'+r.pago.toFixed(2)+'</strong></td></tr>').join('')+
  '<tr class="tot"><td colspan="6" style="text-align:right;padding-right:12px">TOTAL</td><td class="tr">$'+tot.toFixed(2)+'</td></tr></tbody></table></div>'+
  '<button class="btn bb" style="margin-top:10px" onclick="impr(\'transferencias\',\''+desde+'\',\''+hasta+'\',\'\')">Imprimir detalle</button>';
};

window.impr=function(tipo,desde,hasta,area){
  const el=document.getElementById(tipo==='nomina'?'inf-res':'trans-res');
  if(!el?.innerHTML){toast('Genera el informe primero','err');return}
  const w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>XURI</title><style>*{box-sizing:border-box}body{font-family:sans-serif;font-size:11px;padding:20px;color:#111}table{width:100%;border-collapse:collapse}th{background:#1a5c32;color:#fff;padding:7px 8px;text-align:left;font-size:10px}td{padding:6px 8px;border-bottom:1px solid #eee}tr.tot td{background:#1a5c32;color:#fff;font-weight:700;border:none}.tr{text-align:right}.tc{text-align:center}.chip{background:#e8f3e8;color:#1a5c32;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:700}button{display:none}.ihdr{background:#1a5c32;color:#fff;padding:12px;border-radius:4px 4px 0 0;margin-bottom:0}.ihdr h3,.ihdr .iemp,.ihdr .iper{color:rgba(255,255,255,.9)}@media print{button{display:none}}</style></head><body><p style="font-size:9px;color:#888;margin-bottom:4px">EMPRESA: XURI S.A. - PROCESO: NOMINA MENSUAL - TRABAJADORES EVENTUALES</p>'+el.innerHTML+'<p style="margin-top:16px;font-size:10px;color:#aaa">Generado: '+new Date().toLocaleString('es-EC')+'</p></body></html>');
  w.document.close();setTimeout(()=>w.print(),400);
};
