<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a5c32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="XURI">
<link rel="manifest" href="manifest.json">
<title>XURI S.A.</title>
<style>
:root{--v:#1a5c32;--vc:#e8f3e8;--r:#c0392b;--a:#d4860b;--az:#1a6fa3;--bg:#f4f6f4;--bd:#dde5dd;--w:#fff;--tx:#1a1a1a;--t2:#5a7a5a;--t3:#9aaa9a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px}
#loader{position:fixed;inset:0;background:var(--v);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:14px}
#loader h2{font-size:22px;font-weight:800}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:calc(env(safe-area-inset-bottom)+72px);left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:9999;pointer-events:none;white-space:nowrap;max-width:92vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--v)}#toast.err{background:var(--r)}#toast.info{background:var(--az)}
#login{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:100;overflow-y:auto}
.lcard{background:var(--w);border-radius:20px;border:1px solid var(--bd);padding:28px 22px;width:100%;max-width:360px}
.llogo{text-align:center;margin-bottom:22px}
.llogo .emp{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.15em;text-transform:uppercase}
.llogo h1{font-size:26px;font-weight:800;color:var(--v);margin-top:4px}
.llogo p{font-size:12px;color:var(--t3);margin-top:3px}

/* FIX 6: Larger role buttons with bigger icons */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.rbtn{padding:18px 10px 14px;border-radius:14px;border:2px solid var(--bd);background:#fafcfa;cursor:pointer;text-align:center;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.15s}
.rbtn:active{transform:scale(.95)}
.rbtn.sel{border-color:var(--v);background:var(--vc)}
/* FIX 6: Bigger icons */
.rico{font-size:34px;line-height:1.2}
.rlbl{font-size:12px;font-weight:700;color:var(--tx)}
.rsub{font-size:10px;color:var(--t3)}

/* FIX 1: Password field with eye icon */
.pinw{display:flex;gap:8px;margin-bottom:6px;position:relative;align-items:center}
.pinw input{flex:1;padding:12px 44px 12px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:16px;font-family:inherit;background:var(--w);color:var(--tx)}
.pinw input:focus{outline:none;border-color:var(--v);box-shadow:0 0 0 3px rgba(26,92,50,.1)}
.pin-wrap{flex:1;position:relative;display:flex}
.pin-wrap input{width:100%;padding:12px 44px 12px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:16px;font-family:inherit;background:var(--w);color:var(--tx)}
.pin-wrap input:focus{outline:none;border-color:var(--v);box-shadow:0 0 0 3px rgba(26,92,50,.1)}
.pin-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--t3);padding:4px;line-height:1;user-select:none}
.pin-eye:hover{color:var(--t2)}

.lerr{color:var(--r);font-size:12px;display:none;margin-top:4px}
#app{display:none;height:100%;flex-direction:column}
#app.show{display:flex}
.hdr{background:var(--v);color:#fff;padding:env(safe-area-inset-top) 0 0;flex-shrink:0}
.hdri{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:10px}
.hbrand{display:flex;flex-direction:column}
.hemp{font-size:9px;opacity:.6;letter-spacing:.12em;text-transform:uppercase}
.hmod{font-size:14px;font-weight:700}
.hright{display:flex;align-items:center;gap:8px}
.hrol{font-size:10px;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:99px;white-space:nowrap}
.bout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.sdot{width:8px;height:8px;border-radius:50%;background:#f87171;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.bnav{display:flex;background:var(--w);border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
.btab{flex:1;padding:10px 4px 8px;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:inherit;color:var(--t3);font-size:10px;font-weight:600}
.btab .bico{font-size:20px;line-height:1}
.btab.act{color:var(--v)}
.bbar{width:20px;height:2px;border-radius:99px;background:transparent;margin:0 auto 2px}
.btab.act .bbar{background:var(--v)}
.pages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:14px 14px calc(env(safe-area-inset-bottom)+60px)}
.page.show{display:block}
.card{background:var(--w);border-radius:12px;border:1px solid var(--bd);padding:14px;margin-bottom:12px}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.stit{font-size:15px;font-weight:700;color:var(--v)}
.ssub{font-size:12px;color:var(--t3);margin-top:1px}
.fg{display:grid;gap:10px;margin-bottom:10px}
.fg2{grid-template-columns:1fr 1fr}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;font-family:inherit;color:var(--tx);background:var(--w);-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--v);box-shadow:0 0 0 3px rgba(26,92,50,.1)}
.field textarea{resize:vertical;min-height:64px}
.btn{padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;min-height:42px}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bg{background:var(--v);color:#fff}
.br{background:var(--r);color:#fff}
.bo{background:var(--a);color:#fff}
.bb{background:var(--az);color:#fff}
.bgr{background:#f0f4f0;color:#444;border:1px solid var(--bd)}
.bsm{padding:6px 12px;font-size:12px;min-height:32px}
.bfull{width:100%}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bdg{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.bdg-g{background:#d4edda;color:#155724}
.bdg-b{background:#d0e8f5;color:#0c4a6e}
.bdg-r{background:#fde8e4;color:#7b1d1d}
.bdg-o{background:#fef3e2;color:#7d4e00}
.bdg-gr{background:#e8ebe8;color:#444}
.wcard{background:var(--w);border-radius:12px;border:1px solid var(--bd);padding:14px;margin-bottom:10px;display:flex;gap:12px}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.av-g{background:#c8f0d0;color:var(--v)}
.av-b{background:#d0e8f5;color:#0c4a6e}
.av-r{background:#fde8e4;color:var(--r)}
.av-k{background:#e8ebe8;color:#444}
.winfo{flex:1;min-width:0}
.wname{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wsub{font-size:12px;color:var(--t2);margin-top:2px}
.wtiny{font-size:11px;color:var(--t3);margin-top:2px}
.wact{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.mcard{background:var(--w);border-radius:12px;border:2px solid var(--bd);padding:14px;margin-bottom:8px;transition:.15s}
.mcard.pre{border-color:#2d8a2d;background:#f2fbf2}
.mtop{display:flex;align-items:center;gap:12px}
.mchk{width:30px;height:30px;border-radius:8px;border:2px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--w);font-size:16px;transition:.15s;user-select:none}
.mchk.on{background:var(--v);border-color:var(--v);color:#fff}
.mname{font-weight:700;font-size:14px;flex:1}
.marea{font-size:11px;color:var(--t2)}
.mdet{margin-top:12px;display:none;flex-direction:column;gap:8px}
.mdet.show{display:flex}

/* FIX 2: Fixed feriado checkbox layout - aligned inline, not oversized */
.mtimes{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mfer-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;background:var(--w);cursor:pointer;font-size:13px;font-weight:600;color:var(--tx);margin-top:0}
.mfer-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--v);cursor:pointer;flex-shrink:0}

.mpago{font-size:16px;font-weight:800;color:var(--v)}
.matr{font-size:12px;color:var(--r);font-weight:700}
.ncard{background:var(--w);border-radius:12px;border:1.5px solid #fde8e4;padding:14px;margin-bottom:10px}
.cal-wrap{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.cal-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--bd);background:#fafcfa;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:.12s}
.cal-btn.sel{background:var(--a);border-color:var(--a);color:#fff}
.iwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:1px solid var(--bd);margin-bottom:12px}
.iwrap table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
.iwrap th{background:#f0f4f0;padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t2);border-bottom:1px solid var(--bd);white-space:nowrap}
.iwrap td{padding:8px 10px;border-bottom:1px solid #f4f6f4;vertical-align:middle}
.iwrap tr:last-child td{border-bottom:none}
.iwrap tr.tot td{background:var(--v);color:#fff;font-weight:700;border:none}
.tr{text-align:right;font-variant-numeric:tabular-nums}
.tc{text-align:center}
.dc{color:var(--r);font-weight:700}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--w);border-radius:8px;border:1px solid var(--bd);padding:10px;text-align:center}
.snum{font-size:20px;font-weight:800;color:var(--v)}
.slbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.ihdr{background:var(--v);color:#fff;border-radius:12px 12px 0 0;padding:14px 16px}
.ihdr .iemp{font-size:9px;opacity:.7;letter-spacing:.12em;text-transform:uppercase}
.ihdr h3{font-size:16px;font-weight:700;margin:2px 0}
.ihdr .iper{font-size:12px;opacity:.8}
.pchip{background:var(--vc);border:1px solid #b8d8b8;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.pdates{font-weight:700;font-size:13px;color:var(--v)}
.parea{font-size:12px;color:var(--t2);margin-top:2px}
.nbaja{background:#fef3e2;border:1px solid #f5d89a;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#7d4e00}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
.mbg.show{display:flex}
.msheet{background:var(--w);border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);animation:sup .25s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mpull{width:36px;height:4px;background:var(--bd);border-radius:99px;margin:10px auto 4px}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 12px}
.mhdr h3{font-size:16px;font-weight:700}
.mclose{background:none;border:none;font-size:24px;cursor:pointer;color:var(--t3);line-height:1}
.mbody{padding:0 18px 18px}
.sep{height:1px;background:var(--bd);margin:12px 0}
.chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:var(--vc);color:var(--v)}
.alerto{background:#fef3e2;border:1px solid #f5d89a;border-radius:8px;padding:10px 12px;font-size:12px;color:#7d4e00;margin-bottom:10px}
.empty{text-align:center;color:var(--t3);padding:32px 16px;font-size:13px}

/* FIX 4: Supervisor worker list styles */
.sv-worker-card{background:var(--w);border-radius:10px;border:1px solid var(--bd);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.sv-worker-info{flex:1;min-width:0}
.sv-worker-name{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sv-worker-sub{font-size:11px;color:var(--t2);margin-top:2px}

@media(min-width:700px){.page{max-width:720px;margin:0 auto;padding:20px}.fg2{grid-template-columns:1fr 1fr}.srow{grid-template-columns:repeat(4,1fr)}.mtimes{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>

function hoy(){return new Date().toISOString().slice(0,10)}
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function fmtF(iso){if(!iso)return'--';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y}
function fmtFL(iso){if(!iso)return'--';return new Date(iso+'T12:00:00').toLocaleDateString('es-EC',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}

// calcPAdmin: valor dia = sueldo / 30, con doble valor para fin de semana y feriado
function calcPAdmin(fecha, entrada, salida, feriado, sueldo){
  sueldo=sueldo||500;
  const d=new Date(fecha+'T12:00:00');
  const dow=d.getDay();
  const fin=dow===0||dow===6;
  
  // Valor base del día
  let valorDia=sueldo/30;
  
  // Doble valor para fin de semana o feriado
  if(fin||feriado){
    valorDia*=2;
  }
  
  return Math.round(valorDia*100)/100;
}

// resTAdmin: calcula pago con semana integral
// Semana integral: si trabaja los 5 dias L-V sin faltas -> +2 dias bono (S y D)
function resTAdmin(tId,sueldo,desde,hasta){
  sueldo=sueldo||500;
  var valorDia=Math.round((sueldo/30)*100)/100;
  console.log('DEBUG resTAdmin - tId:', tId, 'sueldo:', sueldo, 'valorDia:', valorDia);
  var asist=CACHE.asistencias.filter(function(a){
    if(a.tId!==tId||a.falta)return false;
    if(desde&&a.fecha<desde)return false;
    if(hasta&&a.fecha>hasta)return false;
    return true;
  });
  console.log('DEBUG resTAdmin - Asistencias encontradas:', asist.length);
  // Agrupar por semana (clave = lunes de esa semana)
  var semanas={};
  var diasSet={};
  asist.forEach(function(a){
    var d=new Date(a.fecha+'T12:00:00');
    var dow=d.getDay();
    if(dow>=1&&dow<=5){
      var lunes=new Date(d);
      lunes.setDate(d.getDate()-(dow-1));
      var key=lunes.toISOString().slice(0,10);
      if(!semanas[key])semanas[key]=0;
      semanas[key]++;
    }
    diasSet[a.fecha]=true;
  });
  var diasTrabajados=Object.keys(diasSet).length;
  var semanasIntegrales=0,bonoDias=0;
  Object.keys(semanas).forEach(function(k){
    if(semanas[k]>=1){semanasIntegrales++;bonoDias+=2;} // Bono siempre que trabaje al menos 1 dia de esa semana
  });
  // Calcular pago real considerando días especiales
  var pagoReal=0;
  asist.forEach(function(a){
    var valorDiaReal=calcPAdmin(a.fecha,a.entrada,a.salida,a.feriado,sueldo);
    pagoReal+=valorDiaReal;
  });
  
  // Agregar bono de días de fin de semana (sábado y domingo) con valor normal
  var pagoBono=bonoDias*valorDia;
  var pagoTotal=pagoReal+pagoBono;
  var totalDias=diasTrabajados+bonoDias;
  
  console.log('DEBUG resTAdmin - pagoReal:', pagoReal, 'pagoBono:', pagoBono, 'pagoTotal:', pagoTotal);
  console.log('DEBUG resTAdmin - diasTrabajados:', diasTrabajados, 'bonoDias:', bonoDias);
  
  return{pago:Math.round(pagoTotal*100)/100,diasTrabajados:diasTrabajados,semanasIntegrales:semanasIntegrales,bonoDias:bonoDias,totalDias:totalDias,valorDia:valorDia};
}

function calcP(fecha,entrada,salida,feriado){
  const d=new Date(fecha+'T12:00:00');const dow=d.getDay();const fin=dow===0||dow===6;
  const tar=(fin||feriado)?25:20;const th=tar/9;
  const eM=toMin(entrada),sM=toMin(salida),ref=toMin('08:00');
  const trab=Math.max(0,sM-Math.max(eM,ref));const ef=Math.max(0,trab-60);const h=ef/60;
  const pago=Math.min(tar,h*th);const aH=(Math.max(0,eM-ref))/60;const dV=aH*th;
  return{pago:Math.round(pago*100)/100,horas:Math.round(h*10)/1,tarifa:tar,fin,feriado,atrasoH:Math.round(aH*10)/10,descVal:Math.round(dV*100)/100};
}
function resT(tId,desde,hasta){
  const as=CACHE.asistencias.filter(a=>{if(a.tId!==tId)return false;if(desde&&a.fecha<desde)return false;if(hasta&&a.fecha>hasta)return false;return true;});
  let p=0,d=0,faltas=0,aH=0,dV=0;
  as.forEach(a=>{
    if(a.falta){faltas++;return;} // falta: no cuenta como dia trabajado, no suma pago
    d++;
    const c=calcP(a.fecha,a.entrada,a.salida,a.feriado);
    p+=c.pago;aH+=c.atrasoH;dV+=c.descVal;
  });
  return{pago:Math.round(p*100)/100,dias:d,faltas:faltas,atrasoH:Math.round(aH*10)/10,descVal:Math.round(dV*100)/100};
}

let uns=[];
let _appInitialized=false;
let _renderTimer=null;
function _scheduleRender(){
  clearTimeout(_renderTimer);
  _renderTimer=setTimeout(function(){
    if(!ROL||!tabActual)return;
    var modalOpen=document.getElementById('modal')&&document.getElementById('modal').classList.contains('show');
    if(modalOpen)return;
    var renders={trabajadores:rT,estados:rE,lnegra:rLN,marcacion:rM,faltas:rFaltas,historial:rHist,bajas:rBajas,marc_admin:rMarcAdmin,faltas_admin:rFaltasAdmin,hist_admin:rHistAdmin,sv_vista:rSV,sv_periodos:rSVP,nomina:rNomina};
    if(renders[tabActual])renders[tabActual]();
  },80);
}
function startLS(){
  uns.forEach(function(u){u();});uns=[];
  _appInitialized=false;
  var cols=['trabajadores','asistencias','listaNegra','periodos'];
  cols.forEach(function(col){
    var u=onSnapshot(query(COL[col](),orderBy('_ts','asc')),function(snap){
      CACHE[col]=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});
      CACHE._loaded[col]=true;
      var sdot=document.getElementById('sdot');
      if(sdot)sdot.style.background='#4ade80';
      if(!_appInitialized){
        var allLoaded=cols.every(function(c){return CACHE._loaded[c];});
        if(allLoaded){
          _appInitialized=true;
          document.getElementById('loader').style.display='none';
          document.getElementById('login').style.display='flex';
        }
      }
      if(ROL&&tabActual)_scheduleRender();
    },function(err){
      console.error(err);
      var sdot=document.getElementById('sdot');
      if(sdot)sdot.style.background='#f87171';
    });
    uns.push(u);
  });
}

function rT(){
  var todos=CACHE.trabajadores.filter(function(t){return t.estado!=='archivado';});
  var activos=todos.filter(function(t){return t.estado==='activo'||t.estado==='contrato';});
  var inactivos=todos.filter(function(t){return t.estado==='baja';});

  function wCard(t){
    var esActivo=t.estado==='activo';
    var esBaja=t.estado==='baja';
    return '<div class="wcard">'+
      '<div class="av '+avCls(t.estado)+'">'+inic(t.nombres)+'</div>'+
      '<div class="winfo">'+
        '<div class="wname">'+t.nombres+'</div>'+
        '<div class="wsub">'+t.area+' - C.I. '+t.cedula+'</div>'+
        '<div class="wtiny">'+t.cargo+'</div>'+
        '<div class="wtiny">'+(t.banco||'Sin banco')+' - '+(t.cuenta||'Sin cuenta')+'</div>'+
        '<div style="margin-top:6px"><span class="bdg '+bdgCls(t.estado)+'">'+estLbl(t.estado)+'</span></div>'+
        '<div class="wact">'+
          '<button class="btn bgr bsm" data-id="'+t.id+'" onclick="mTrab(this.dataset.id)">Editar</button>'+
          (esActivo?'<button class="btn bo bsm" data-id="'+t.id+'" data-estado="inactivo" onclick="togActivo(this.dataset.id,this.dataset.estado)">Inactivar</button>':'')+
          (esBaja?'<button class="btn bg bsm" data-id="'+t.id+'" data-estado="activo" onclick="togActivo(this.dataset.id,this.dataset.estado)">Activar</button>':'')+
          (esActivo?'<button class="btn bo bsm" data-id="'+t.id+'" onclick="mContr(this.dataset.id)">Contrato</button>':'')+
          ((esActivo||esBaja)?'<button class="btn br bsm" data-id="'+t.id+'" onclick="mNegra(this.dataset.id)">Lista negra</button>':'')+
          '<button class="btn br bsm" data-id="'+t.id+'" data-tipo="trabajador" onclick="mBorr(this.dataset.tipo,this.dataset.id)">Eliminar</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  pg('trabajadores',
    '<div class="shdr">'+
      '<div><div class="stit">Trabajadores</div>'+
      '<div class="ssub">'+activos.length+' activo'+(activos.length!==1?'s':'')+
      ' &middot; '+inactivos.length+' inactivo'+(inactivos.length!==1?'s':'')+'</div></div>'+
      '<button class="btn bg bsm" onclick="mTrab(null)">+ Nuevo</button>'+
    '</div>'+
    (activos.length
      ?'<div style="font-size:11px;font-weight:700;color:var(--v);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding-left:2px">Activos ('+activos.length+')</div>'+activos.map(wCard).join('')
      :'<div class="empty">Sin trabajadores activos</div>')+
    (inactivos.length
      ?'<div style="font-size:11px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px;padding-left:2px">Inactivos ('+inactivos.length+')</div>'+inactivos.map(wCard).join('')
      :'')
  );
}

    // Store id in a closure var, not in onclick string
    window._inactivarId=id;
    openModal('Inactivar a '+t.nombres,
      '<p style="font-size:13px;margin-bottom:12px">El trabajador quedara inactivo y no aparecera en marcacion diaria del Jefe de Bodega.</p>'+
      '<div class="field" style="margin-bottom:10px"><label>Fecha</label><input type="date" id="fb2" value="'+hoy()+'"></div>'+

        '<button class="btn bgr" onclick="closeModal()">Cancelar</button>'+

    await fupd('trabajadores',id,{estado:'activo',fechaBaja:'',motivoBaja:''});
    toast('Trabajador reactivado - ya aparece en marcacion de Bodega');

async function guardT(id){
  const n=document.getElementById('tn').value.trim(),c=document.getElementById('tc').value.trim();
  if(!n||!c){toast('Nombre y cedula son obligatorios','err');return}
  const btn=document.getElementById('btnGT');btn.disabled=true;btn.textContent='Guardando...';
  var tipoPago=document.getElementById('ttipopago').value;
  var valorPago=parseFloat(document.getElementById('tvalor').value)||0;
  const d={nombres:n,cedula:c,tel:document.getElementById('ttel').value.trim(),email:document.getElementById('tem').value.trim(),dir:document.getElementById('tdir').value.trim(),area:document.getElementById('ta').value,cargo:document.getElementById('tcar').value,fechaIngreso:document.getElementById('tfi').value,banco:document.getElementById('tbco').value,tipoCuenta:document.getElementById('ttipo').value,cuenta:document.getElementById('tcta').value.trim(),tipoPago:tipoPago,valorPago:valorPago,sueldo:tipoPago==='mensual'?valorPago:0};
  try{
    if(id){
      await fupd('trabajadores',id,d);
      toast('Trabajador actualizado correctamente');
    } else {
      await fadd('trabajadores',{...d,estado:'activo',fechaContrato:'',fechaBaja:'',motivoBaja:''});
      toast('Trabajador ingresado correctamente');
    }
    closeModal();
  }catch(e){toast('Error: '+e.message,'err');btn.disabled=false;btn.textContent='Guardar';}
}

function mBorr(tipo,id){
  const msgs={trabajador:'Eliminar este trabajador y todas sus asistencias?',asistencia:'Eliminar este registro de asistencia?',negra:'Eliminar de lista negra?',periodo:'Eliminar este periodo?'};
  openModal('Confirmar eliminacion','<p style="font-size:14px;margin-bottom:18px">'+msgs[tipo]+' Esta accion no se puede deshacer.</p><div class="brow" style="justify-content:flex-end"><button class="btn bgr" onclick="closeModal()">Cancelar</button><button class="btn br" onclick="execBorr(\''+tipo+'\',\''+id+'\')">Eliminar</button></div>');
}
window.mBorr=mBorr;
async function execBorr(tipo,id){
  closeModal(); // Cerrar ANTES de borrar para que _scheduleRender no lo bloquee
  try{
    if(tipo==='trabajador'){
      await fdel('trabajadores',id);
      await Promise.all(CACHE.asistencias.filter(a=>a.tId===id).map(a=>fdel('asistencias',a.id)));
      toast('Trabajador eliminado correctamente');
    } else if(tipo==='asistencia'){
      await fdel('asistencias',id);
      toast('Registro eliminado correctamente');
    } else if(tipo==='negra'){
      var nReg=CACHE.listaNegra.find(x=>x.id===id);
      await fdel('listaNegra',id);
      if(nReg&&nReg.tId){await fupd('trabajadores',nReg.tId,{estado:'activo',fechaBaja:'',motivoBaja:''});}
      toast('Eliminado de lista negra y reactivado');
    } else if(tipo==='periodo'){
      await fdel('periodos',id);
      toast('Periodo eliminado');
    }
    // Forzar re-render explícito por si el debounce ya pasó
    if(ROL&&tabActual){
      var renders={trabajadores:rT,estados:rE,lnegra:rLN,marcacion:rM,faltas:rFaltas,historial:rHist,bajas:rBajas,marc_admin:rMarcAdmin,faltas_admin:rFaltasAdmin,hist_admin:rHistAdmin,sv_vista:rSV,sv_periodos:rSVP,nomina:rNomina,personal:rPers,admin_evt:rAdminEvt,jlnegra:rJLN};
      if(renders[tabActual])renders[tabActual]();
    }
  }catch(e){toast('Error: '+e.message,'err');}
}
window.execBorr=execBorr;

// MARCACION
// mMap: estado local del dia. mFechaLoaded: evita pisar cambios del usuario en re-renders.
let mFecha=hoy(),mMap={},mFechaLoaded='';

function rM(){
  const act=CACHE.trabajadores.filter(function(t){return t.estado==='activo'&&t.area==='BODEGA';});
  const bajas=CACHE.trabajadores.filter(function(t){return t.estado==='baja'&&t.fechaBaja&&((new Date()-new Date(t.fechaBaja+'T12:00:00'))/86400000)<7;});
  const d=new Date(mFecha+'T12:00:00');
  const eFin=d.getDay()===0||d.getDay()===6;

  if(mFechaLoaded!==mFecha){
    mFechaLoaded=mFecha;
    mMap={};
    CACHE.asistencias.filter(function(a){return a.fecha===mFecha&&act.find(function(t){return t.id===a.tId;});}).forEach(function(a){
      if(a.falta){
        mMap[a.tId]={presente:false,falta:true,entrada:'08:00',salida:'18:00',feriado:false,atraso:0,almuerzo:false,obs:a.obs||''};
      } else {
        mMap[a.tId]={presente:true,falta:false,entrada:a.entrada,salida:a.salida,feriado:a.feriado,atraso:a.atraso||0,almuerzo:a.almuerzo||false,obs:a.obs||''};
      }
    });
  } else {
    CACHE.asistencias.filter(function(a){return a.fecha===mFecha&&act.find(function(t){return t.id===a.tId;});}).forEach(function(a){
      if(!mMap[a.tId]){
        if(a.falta){
          mMap[a.tId]={presente:false,falta:true,entrada:'08:00',salida:'18:00',feriado:false,atraso:0,almuerzo:false,obs:a.obs||''};
        } else {
          mMap[a.tId]={presente:true,falta:false,entrada:a.entrada,salida:a.salida,feriado:a.feriado,atraso:a.atraso||0,almuerzo:a.almuerzo||false,obs:a.obs||''};
        }
      }
    });
  }

  var rows=act.map(function(t){
    var m=mMap[t.id]||{presente:false,entrada:'08:00',salida:'18:00',feriado:eFin,atraso:0,almuerzo:false,obs:''};
    var eFinVal=eFin?1:0;
    var esFin=eFin||m.feriado;
    return '<div class="mcard'+(m.presente?' pre':m.falta?' style=\"border-color:var(--r);background:#fde8e4\"':'')+'" id="mc-'+t.id+'">'+
      '<div class="mtop">'+
        '<div class="mchk'+(m.presente?' on':'')+'" id="mchk-'+t.id+'" data-id="'+t.id+'" data-efin="'+eFinVal+'" onclick="togPBtn(this)">'+(m.presente?'&#x2713;':m.falta?'&#x2717;':'')+'</div>'+
        '<div style="flex:1"><div class="mname">'+t.nombres+'</div><div class="marea">'+t.area+(m.falta?' &nbsp;<span style="background:var(--r);color:#fff;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:700">FALTA</span>':'')+'</div></div>'+
      '</div>'+
      '<div class="mdet'+(m.presente?' show':'')+'" id="mdet-'+t.id+'">'+
        (esFin
          ? '<div class="mtimes">'+
              '<div class="field"><label>Entrada</label><input type="time" id="ment-'+t.id+'" value="'+m.entrada+'" data-id="'+t.id+'"></div>'+
              '<div class="field"><label>Salida</label><input type="time" id="msal-'+t.id+'" value="'+m.salida+'" data-id="'+t.id+'"></div>'+
            '</div>'+
            '<label class="mfer-row"><input type="checkbox" id="malm-'+t.id+'" '+(m.almuerzo?'checked':'')+' style="width:18px;height:18px;accent-color:var(--v)"><span>Tomo hora de almuerzo (se descuenta 1h)</span></label>'
          : '<div class="field" style="margin-bottom:8px"><label>Atraso (horas)</label><input type="number" id="matr-'+t.id+'" min="0" max="9" step="0.5" value="'+(m.atraso||0)+'" placeholder="0" style="max-width:120px"></div>'
        )+
        '<div class="field"><label>Observacion</label><input id="mobs-'+t.id+'" value="'+(m.obs||'')+'" placeholder="Opcional..."></div>'+
      '</div>'+
      (!m.presente?
        '<div style="margin-top:8px;display:flex;gap:6px">'+
          (m.falta
            ? '<button class="btn bgr bsm" style="flex:1" data-id="'+t.id+'" onclick="quitarFalta(this.dataset.id,\'bodega\')">&#x2715; Quitar falta</button>'
            : '<button class="btn br bsm" style="flex:1" data-id="'+t.id+'" onclick="marcarFaltaRap(this.dataset.id,\'bodega\')">&#x2717; Falta rapida</button>'+
              '<button class="btn bo bsm" style="flex:1" data-id="'+t.id+'" onclick="marcarFaltaMot(this.dataset.id,\'bodega\')">Falta + motivo</button>'
          )+
        '</div>'
      :'')+
    '</div>';
  }).join('');

  pg('marcacion',
    '<div class="shdr"><div><div class="stit">Marcacion diaria - Bodega</div><div class="ssub">'+fmtFL(mFecha)+'</div></div>'+
    '<div class="field" style="margin:0"><input type="date" id="mfd" value="'+mFecha+'" onchange="chFecha(this.value)" style="font-size:13px;padding:7px 10px"></div></div>'+
    (eFin?'<div class="alerto">Fin de semana - registre hora entrada, salida y si tomo almuerzo</div>':'')+
    bajas.map(function(t){return'<div class="nbaja"><strong>Aviso de baja:</strong> '+t.nombres+' fue dado de baja el '+fmtF(t.fechaBaja)+(t.motivoBaja?' - '+t.motivoBaja:'')+'. No debe marcarse.</div>';}).join('')+
    rows+
    '<div style="position:sticky;bottom:8px;margin-top:16px;padding:4px">'+
      '<button class="btn bg bfull" style="box-shadow:0 4px 12px rgba(26,92,50,.35);font-size:15px;padding:14px" onclick="guardDia()">&#x1F4BE; Guardar marcacion del dia</button>'+
    '</div>');
}

window.chFecha=function(f){
  mFecha=f;
  mFechaLoaded='';
  mMap={};
  rM();
};

window.togPBtn=function(el){togP(el.dataset.id, el.dataset.efin==='1');};
window.updCBtn=function(el){updC(el.dataset.id, el.dataset.efin==='1');};
window.togP=function(tId,eFin){
  if(!mMap[tId]) mMap[tId]={presente:false,entrada:'08:00',salida:'18:00',feriado:eFin,obs:''};
  mMap[tId].presente=!mMap[tId].presente;
  var m=mMap[tId];
  var chk=document.getElementById('mchk-'+tId);
  if(chk){chk.innerHTML=m.presente?'&#x2713;':'';chk.className='mchk'+(m.presente?' on':'');}
  var card=document.getElementById('mc-'+tId);
  if(card)card.className='mcard'+(m.presente?' pre':'');
  var det=document.getElementById('mdet-'+tId);
  if(det)det.className='mdet'+(m.presente?' show':'');
  var pd=document.getElementById('mpd-'+tId);
  if(pd&&!m.presente)pd.innerHTML='';
  if(m.presente)updC(tId,eFin);
};

window.updC=function(tId,eFin){
  var entEl=document.getElementById('ment-'+tId);
  var salEl=document.getElementById('msal-'+tId);
  var ferEl=document.getElementById('mfer-'+tId);
  var en=entEl?entEl.value:'08:00';
  var sa=salEl?salEl.value:'18:00';
  var fe=ferEl?ferEl.checked:eFin;
  var c=calcP(mFecha,en,sa,fe);
  // Actualizar SOLO el div de precio con id unico - nunca hay duplicado
  var pd=document.getElementById('mpd-'+tId);
  if(pd)pd.innerHTML='<div class="mpago">$'+c.pago.toFixed(2)+'</div>'+(c.atrasoH>0?'<div class="matr">-'+c.atrasoH+'h (-$'+c.descVal.toFixed(2)+')</div>':'');
  if(mMap[tId]){mMap[tId].entrada=en;mMap[tId].salida=sa;mMap[tId].feriado=fe;}
};

window.guardDia=async function(){
  var act=CACHE.trabajadores.filter(function(t){return t.estado==='activo'&&t.area==='BODEGA';});
  var btns=document.querySelectorAll('[onclick="guardDia()"]');
  btns.forEach(function(b){b.disabled=true;b.textContent='Guardando...';});
  try{
    var d=new Date(mFecha+'T12:00:00');
    var eFin=d.getDay()===0||d.getDay()===6;
    var registros=act.filter(function(t){return mMap[t.id]&&mMap[t.id].presente;}).map(function(t){
      var esFin=eFin||mMap[t.id].feriado;
      var entEl=document.getElementById('ment-'+t.id);
      var salEl=document.getElementById('msal-'+t.id);
      var almEl=document.getElementById('malm-'+t.id);
      var atrEl=document.getElementById('matr-'+t.id);
      var obsEl=document.getElementById('mobs-'+t.id);
      return{
        tId:t.id,fecha:mFecha,
        entrada:entEl?entEl.value:'08:00',
        salida:salEl?salEl.value:'18:00',
        feriado:esFin,
        almuerzo:almEl?almEl.checked:false,
        atraso:atrEl?parseFloat(atrEl.value)||0:0,
        obs:obsEl?obsEl.value:''
      };
    });
    // Borrar registros existentes del dia (solo BODEGA)
    await Promise.all(CACHE.asistencias.filter(function(a){return a.fecha===mFecha&&act.find(function(t){return t.id===a.tId;});}).map(function(a){return fdel('asistencias',a.id);}));
    // Guardar nuevos
    await Promise.all(registros.map(function(r){return fadd('asistencias',r);}));
    registros.forEach(function(r){
      mMap[r.tId]={presente:true,entrada:r.entrada,salida:r.salida,feriado:r.feriado,almuerzo:r.almuerzo,atraso:r.atraso,obs:r.obs};
    });
    mFechaLoaded=mFecha;
    toast('Marcacion guardada: '+registros.length+' persona'+(registros.length!==1?'s':''));
  }catch(e){toast('Error: '+e.message,'err');}
  finally{btns.forEach(function(b){b.disabled=false;b.innerHTML='&#x1F4BE; Guardar marcacion del dia';});}
}

  (as.length?'<div class="iwrap"><table><thead><tr><th>Fecha</th><th>Trabajador</th><th>Estado</th><th>Detalle</th></tr></thead><tbody>'+
  as.map(a=>{
    const t=CACHE.trabajadores.find(x=>x.id===a.tId);if(!t)return'';
    const esFalta=a.falta;
    const esJ=a.justificado;
    const d=new Date(a.fecha+'T12:00:00');
    const esFin=d.getDay()===0||d.getDay()===6||a.feriado;
    var detalle='';
    if(esFalta) detalle='<span style="color:var(--r);font-weight:700">FALTA</span>';
    else if(esJ) detalle='<span style="color:var(--a);font-weight:700">Justificado</span>';
    else if(esFin) detalle=a.entrada+' - '+a.salida+(a.almuerzo?' · almuerzo desc.':'');
    else detalle='Presente'+(a.atraso>0?' · <span style="color:var(--r)">atraso '+a.atraso+'h</span>':'');
    return'<tr><td style="white-space:nowrap">'+fmtF(a.fecha)+'</td>'+
      '<td><strong>'+t.nombres+'</strong></td>'+
      '<td>'+(esFalta?'<span class="bdg bdg-r">Falta</span>':esJ?'<span class="bdg bdg-o">Justif.</span>':esFin?'<span class="bdg bdg-b">Fin sem.</span>':'<span class="bdg bdg-g">Presente</span>')+'</td>'+
      '<td>'+detalle+'</td>'+
    '</tr>';
  }).join('')+'</tbody></table></div>':'<div class="empty">Sin registros de asistencia para BODEGA</div>'));
}

function rSV(){
  var act=CACHE.trabajadores.filter(function(t){return t.estado==='activo';});
  var hoyStr=hoy();
  var marcHoy=CACHE.asistencias.filter(function(a){return a.fecha===hoyStr;});
  var idsMarcadosHoy=marcHoy.map(function(a){return a.tId;});
  // Trabajadores activos NO marcados hoy
  var noMarcados=act.filter(function(t){return idsMarcadosHoy.indexOf(t.id)<0;});
  var tP=0;
  CACHE.asistencias.forEach(function(a){tP+=calcP(a.fecha,a.entrada,a.salida,a.feriado).pago;});

  // ── Alerta de no marcados (siempre visible si hay activos sin marcar) ──
  var alertaHtml='';

        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
          '<span style="font-size:20px">⚠️</span>'+
          '<div>'+
            '<div style="font-weight:800;color:var(--r);font-size:14px">'+noMarcados.length+' sin marcar hoy</div>'+
            '<div style="font-size:11px;color:#c0392b">El Jefe de Bodega aun no los ha registrado</div>'+
          '</div>'+
        '</div>'+
        noMarcados.map(function(t){
          return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid rgba(192,57,43,.2)">'+
            '<div class="av av-r" style="width:30px;height:30px;font-size:11px">'+inic(t.nombres)+'</div>'+
            '<div><div style="font-weight:700;font-size:12px">'+t.nombres+'</div>'+
            '<div style="font-size:11px;color:var(--r)">'+t.area+'</div></div>'+
          '</div>';
        }).join('')+
      '</div>';
  }

  // ── Stats ──
  var stats=
    '<div class="srow" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">'+
      '<div class="stat"><div class="snum">'+act.length+'</div><div class="slbl">Activos</div></div>'+
      '<div class="stat"><div class="snum '+(noMarcados.length>0?'" style="color:var(--r)':'')+'">'+(act.length-noMarcados.length)+'</div><div class="slbl">Marcados hoy</div></div>'+
      '<div class="stat"><div class="snum">$'+tP.toFixed(0)+'</div><div class="slbl">Acumulado</div></div>'+
    '</div>';

  // ── Marcaciones de hoy ──
  var marcHoyHtml='<div class="card" style="margin-bottom:12px"><div class="stit" style="margin-bottom:10px">Marcacion de hoy</div>';
  if(marcHoy.length===0){
    marcHoyHtml+='<div class="empty" style="padding:12px">Sin marcaciones registradas hoy</div>';
  } else {
    marcHoyHtml+=marcHoy.map(function(a){
      var t=CACHE.trabajadores.find(function(x){return x.id===a.tId;});
      if(!t)return'';
      var c=calcP(a.fecha,a.entrada,a.salida,a.feriado);
      var esJustif=a.justificado;
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">'+
        '<div class="av '+(esJustif?'av-k':'av-g')+'" style="width:34px;height:34px;font-size:12px">'+inic(t.nombres)+'</div>'+
        '<div style="flex:1;min-width:0">'+

window.exportarNominaExcel = function() {
  var el = document.getElementById('nom-res');
  if (!el || !el.innerHTML.trim()) { toast('Genera el informe primero', 'err'); return; }
  var table = el.querySelector('table');
  if (!table) { toast('Sin datos para exportar', 'err'); return; }

  // Obtener encabezados
  var ths = table.querySelectorAll('thead th');
  var headers = [];
  ths.forEach(function(th) { headers.push((th.innerText || th.textContent).trim()); });

  // Obtener filas de datos y fila de totales
  var dataRows = [];
  var totRow = null;
  var trs = table.querySelectorAll('tbody tr');

  trs.forEach(function(tr) {
    var esTot = tr.classList.contains('tot');
    var tds = tr.querySelectorAll('td');
    var row = [];

    tds.forEach(function(td, ci) {
      // Extraemos el texto de la celda
      var txt = (td.innerText || td.textContent).trim();

      // Índices de columnas que DEBEN ser números (Dinero y Días):
      // 0 (N), 7 (S.Diario), 8 (Días), 9 (Descuento), 13 (Total)
      if ([0, 7, 8, 9, 13].includes(ci)) {
        var numLimpiado = txt.replace(/[$ ]/g, '').replace(/,/g, '');
        var num = parseFloat(numLimpiado);
        row.push(!isNaN(num) ? num : 0);
      } else {
        // Todo lo demás (Fecha de Ingreso, Nombres, Cédula, Cuentas) se pasa como TEXTO puro
        // Esto evita que Excel corte la fecha al encontrar el primer número
        row.push(txt);
      }
    });

    if (esTot) totRow = row; else dataRows.push(row);
  });

  var desde = document.getElementById('id') ? document.getElementById('id').value : '';
  var hasta = document.getElementById('ih') ? document.getElementById('ih').value : '';
  // ── Construir XML Excel con estilos ──
  var xml='<?xml version="1.0" encoding="UTF-8"?>\n'
    +'<?mso-application progid="Excel.Sheet"?>\n'
    +'<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"'
    +' xmlns:o="urn:schemas-microsoft-com:office:office"'
    +' xmlns:x="urn:schemas-microsoft-com:office:excel"'
    +' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n'
    +'<Styles>\n'
    // Titulo empresa
    +'<Style ss:ID="sTit"><Font ss:Bold="1" ss:Size="14" ss:Color="#1a5c32"/>'
    +'<Alignment ss:Horizontal="Center"/></Style>\n'
    // Subtitulo periodo
    +'<Style ss:ID="sSub"><Font ss:Italic="1" ss:Size="10" ss:Color="#5a7a5a"/>'
    +'<Alignment ss:Horizontal="Center"/></Style>\n'
    // Encabezado tabla: fondo verde oscuro, texto blanco, negrita
    +'<Style ss:ID="sHdr"><Font ss:Bold="1" ss:Color="#FFFFFF" ss:Size="10"/>'
    +'<Interior ss:Color="#1a5c32" ss:Pattern="Solid"/>'
    +'<Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="2" ss:Color="#FFFFFF"/></Borders>'
    +'<Alignment ss:Horizontal="Center" ss:Vertical="Center" ss:WrapText="1"/></Style>\n'
    // Celda normal
    +'<Style ss:ID="sDat"><Font ss:Size="10"/>'
    +'<Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#dde5dd"/></Borders>'
    +'<Alignment ss:Vertical="Center"/></Style>\n'
    // Celda numero
    +'<Style ss:ID="sNum"><Font ss:Size="10"/>'
    +'<NumberFormat ss:Format="#,##0.00"/>'
    +'<Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#dde5dd"/></Borders>'
    +'<Alignment ss:Horizontal="Right" ss:Vertical="Center"/></Style>\n'
    // Celda nombre (negrita)
    +'<Style ss:ID="sNom"><Font ss:Bold="1" ss:Size="10"/>'
    +'<Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#dde5dd"/></Borders>'
    +'<Alignment ss:Vertical="Center"/></Style>\n'
    // Fila alternada
    +'<Style ss:ID="sAlt"><Font ss:Size="10"/>'
    +'<Interior ss:Color="#f4f6f4" ss:Pattern="Solid"/>'
    +'<Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#dde5dd"/></Borders>'
    +'<Alignment ss:Vertical="Center"/></Style>\n'
    // Fila alternada numero
    +'<Style ss:ID="sAltN"><Font ss:Size="10"/>'
    +'<Interior ss:Color="#f4f6f4" ss:Pattern="Solid"/>'
    +'<NumberFormat ss:Format="#,##0.00"/>'
    +'<Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#dde5dd"/></Borders>'
    +'<Alignment ss:Horizontal="Right" ss:Vertical="Center"/></Style>\n'
    // Descuento (rojo)
    +'<Style ss:ID="sDsc"><Font ss:Bold="1" ss:Color="#c0392b" ss:Size="10"/>'
    +'<NumberFormat ss:Format="#,##0.00"/>'
    +'<Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#dde5dd"/></Borders>'
    +'<Alignment ss:Horizontal="Right" ss:Vertical="Center"/></Style>\n'
    // Total final: fondo verde, texto blanco, negrita
    +'<Style ss:ID="sTot"><Font ss:Bold="1" ss:Color="#FFFFFF" ss:Size="11"/>'
    +'<Interior ss:Color="#1a5c32" ss:Pattern="Solid"/>'
    +'<NumberFormat ss:Format="#,##0.00"/>'
    +'<Alignment ss:Horizontal="Right" ss:Vertical="Center"/></Style>\n'
    +'<Style ss:ID="sTotL"><Font ss:Bold="1" ss:Color="#FFFFFF" ss:Size="11"/>'
    +'<Interior ss:Color="#1a5c32" ss:Pattern="Solid"/>'
    +'<Alignment ss:Horizontal="Right" ss:Vertical="Center"/></Style>\n'
    +'</Styles>\n'
    +'<Worksheet ss:Name="Nomina XURI">\n'
    +'<Table ss:DefaultRowHeight="18">\n';

  // Fila 1: Empresa
  xml+='<Row ss:Height="28"><Cell ss:MergeAcross="'+(headers.length-1)+'" ss:StyleID="sTit">'
    +'<Data ss:Type="String">XURI S.A. — NÓMINA DE TRABAJADORES EVENTUALES</Data></Cell></Row>\n';
  // Fila 2: Periodo
  var perTxt='Periodo: '+( desde||'--')+' al '+(hasta||'--');
  xml+='<Row ss:Height="18"><Cell ss:MergeAcross="'+(headers.length-1)+'" ss:StyleID="sSub">'
    +'<Data ss:Type="String">'+perTxt+'</Data></Cell></Row>\n';
  // Fila 3: vacía
  xml+='<Row ss:Height="8"><Cell ss:MergeAcross="'+(headers.length-1)+'"><Data ss:Type="String"></Data></Cell></Row>\n';

  // Fila encabezados
  xml+='<Row ss:Height="28">';
  headers.forEach(function(h){
    xml+='<Cell ss:StyleID="sHdr"><Data ss:Type="String">'+h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</Data></Cell>';
  });
  xml+='</Row>\n';

  // Columnas con numeros: indices de Total(12), Desc(8), S.Diario(6)
  var numCols={6:true,7:true,8:true,13:true};
  var descCol=9; // Descuentos en rojo

  // Filas de datos
  dataRows.forEach(function(row,ri){
    var par=ri%2===0;
    xml+='<Row ss:Height="20">';
    row.forEach(function(cell,ci){
      var esNum=typeof cell==='number';
      var esDesc=ci===descCol&&esNum&&cell<0;
      var esNom=ci===1;
      var stilo;
      if(ci===descCol&&esNum){stilo='sDsc';}
      else if(esNum&&numCols[ci]){stilo=par?'sNum':'sAltN';}
      else if(esNom){stilo='sNom';}
      else{stilo=par?'sDat':'sAlt';}
      var tipo=esNum?'Number':'String';
      var val=esNum?Math.abs(cell):String(cell).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      xml+='<Cell ss:StyleID="'+stilo+'"><Data ss:Type="'+tipo+'">'+val+'</Data></Cell>';
    });
    xml+='</Row>\n';
  });

  // Fila de totales
  if(totRow){
    xml+='<Row ss:Height="24">';
    totRow.forEach(function(cell,ci){
      var esNum=typeof cell==='number';
      var stilo=esNum?'sTot':'sTotL';
      var tipo=esNum?'Number':'String';
      var val=esNum?cell:String(cell).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      xml+='<Cell ss:StyleID="'+stilo+'"><Data ss:Type="'+tipo+'">'+val+'</Data></Cell>';
    });
    xml+='</Row>\n';
  }

  // Fila pie
  xml+='<Row ss:Height="8"><Cell ss:MergeAcross="'+(headers.length-1)+'"><Data ss:Type="String"></Data></Cell></Row>\n';
  xml+='<Row ss:Height="14"><Cell ss:MergeAcross="'+(headers.length-1)+'" ss:StyleID="sSub">'
    +'<Data ss:Type="String">Generado: '+new Date().toLocaleString('es-EC')+'</Data></Cell></Row>\n';

  xml+='</Table>\n</Worksheet>\n</Workbook>';

  var blob=new Blob([xml],{type:'application/vnd.ms-excel;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='XURI_Nomina_'+(desde||'')+'_'+(hasta||'')+'.xls';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Excel con diseño descargado');
};

window.genNomina=function(){
  const desde=document.getElementById('id').value,hasta=document.getElementById('ih').value;
  iD=desde;iH=hasta;
  if(!desde||!hasta){toast('Seleccione rango de fechas','err');return;}

  // Función de cálculo unificada por tipo de pago
  function calcPagoTrabajador(t,desde,hasta){
    var asist=CACHE.asistencias.filter(function(a){
      return a.tId===t.id&&!a.falta&&!a.justificado&&a.fecha>=desde&&a.fecha<=hasta;
    });
    var tipoPago=t.tipoPago||'diario';
    var valor=t.valorPago||t.sueldo||20;
    var totalPago=0,totalDias=0,totalDescuento=0;

    if(tipoPago==='diario'){
      // $20 L-V, $25 sáb/dom/feriado proporcional a horas
      asist.forEach(function(a){
        totalDias++;
        var d=new Date(a.fecha+'T12:00:00');
        var esFin=d.getDay()===0||d.getDay()===6||a.feriado;
        if(esFin){
          // Calcular horas trabajadas
          var ent=toMin(a.entrada||'08:00');
          var sal=toMin(a.salida||'18:00');
          var horas=(sal-ent)/60;
          if(a.almuerzo)horas=Math.max(0,horas-1);
          var jornadaRef=9; // 9h efectivas = día completo
          var pago=Math.min(25,Math.round((horas/jornadaRef)*25*100)/100);
          totalPago+=pago;
        } else {
          // Día normal $20 menos descuento por atraso
          var atraso=a.atraso||0;
          var descuento=atraso>0?Math.round((atraso/9)*valor*100)/100:0;
          totalDescuento+=descuento;
          totalPago+=(valor-descuento);
        }
      });
    } else {
      // Mensual: valorDia=sueldo/30
      var valorDia=Math.round((valor/30)*100)/100;
      // Días L-V marcados
      asist.forEach(function(a){
        totalDias++;
        var d=new Date(a.fecha+'T12:00:00');
        var esFin=d.getDay()===0||d.getDay()===6||a.feriado;
        if(esFin){
          // Día de descanso trabajado = doble
          var ent=toMin(a.entrada||'08:00');
          var sal=toMin(a.salida||'17:00');
          var horas=(sal-ent)/60;
          if(a.almuerzo)horas=Math.max(0,horas-1);
          var jornadaRef=8;
          var pago=Math.min(valorDia*2,Math.round((horas/jornadaRef)*valorDia*2*100)/100);
          totalPago+=pago;
        } else {
          var atraso=a.atraso||0;
          var descuento=atraso>0?Math.round((atraso/8)*valorDia*100)/100:0;
          totalDescuento+=descuento;
          totalPago+=valorDia-descuento;
        }
      });
      // Sábados y domingos dentro del periodo de contrato (descanso pagado)
      var cur=new Date(desde+'T12:00:00');
      var fin=new Date(hasta+'T12:00:00');
      var ingreso=t.fechaIngreso||'2000-01-01';
      var baja=t.fechaBaja||'9999-12-31';
      while(cur<=fin){
        var dow=cur.getDay();
        var fStr=cur.toISOString().slice(0,10);
        if((dow===0||dow===6)&&fStr>=ingreso&&fStr<=baja){
          // Verificar que no fue marcado como trabajado ese día
          var marcado=asist.find(function(a){return a.fecha===fStr;});
          if(!marcado){
            totalDias++;
            totalPago+=valorDia;
          }
        }
        cur.setDate(cur.getDate()+1);
      }
    }
    return{pago:Math.round(totalPago*100)/100,dias:totalDias,descuento:Math.round(totalDescuento*100)/100};
  }

 const tr = CACHE.trabajadores.filter(t => t.estado === 'activo' || t.estado === 'contrato');
  let tTotal = 0, tDias = 0, n = 0;
  const filas = tr.map(function(t) {

      '<td style="font-size:11px">' + (t.banco || '--') + '</td>' +

  }).filter(Boolean);

 if(!filas.length){document.getElementById('nom-res').innerHTML='<div class="empty">Sin registros para ese periodo</div>';return;}
  const d1=new Date(desde+'T12:00:00'),d2=new Date(hasta+'T12:00:00');
  const per=d1.toLocaleDateString('es-EC',{day:'numeric',month:'long',year:'numeric'})+' al '+d2.toLocaleDateString('es-EC',{day:'numeric',month:'long',year:'numeric'});

    '<div class="iwrap"><table><thead><tr>'+
      '<th>N</th><th>Nombres</th><th>Cedula</th><th>Cargo</th><th>F.Ingreso</th><th>Area</th><th>Tipo</th><th>S.Diario</th><th>Dias</th><th>Desc.</th><th>Banco</th><th>T.Cuenta</th><th># Cuenta</th><th>Total</th>'+
    '</tr></thead><tbody>'+
    filas.join('')+
    // Se usa colspan="13" para que el texto ocupe las primeras 13 columnas y el monto caiga en la 14 (Total)
    '<tr class="tot"><td colspan="13" style="text-align:right;padding-right:12px">TOTAL GENERAL ('+n+' personas · '+tDias+' dias)</td><td class="tr">$'+tTotal.toFixed(2)+'</td></tr>'+
    '</tbody></table></div>'+
    '<div style="display:flex;gap:8px;margin-top:12px"><button class="btn bb" style="flex:1" onclick="imprimirNomina()">&#x1F5A8; Imprimir nomina</button><button class="btn bg" style="flex:1" onclick="exportarNominaExcel()">&#x1F4C5; Exportar Excel</button></div>';

window.genFaltas=function(){
  fF=document.getElementById('ff').value;
  fH=document.getElementById('fh').value;
  fArea=document.getElementById('farea').value;
  // Generar lista de dias laborables en el rango
  var dias=[];
  var cur=new Date(fF+'T12:00:00');
  var fin=new Date(fH+'T12:00:00');
  while(cur<=fin){
    dias.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }
  // Trabajadores activos (y algunos inactivos que estuvieron activos en el periodo)
  var trabjs=CACHE.trabajadores.filter(function(t){
    return !fArea||t.area===fArea;
  }).filter(function(t){
    return t.estado==='activo'||t.estado==='baja'||t.estado==='contrato';
  });
  // Para cada trabajador, calcular dias que debio trabajar vs dias marcados
  var resultado=[];
  trabjs.forEach(function(t){
    var ingreso=t.fechaIngreso||'2000-01-01';
    var baja=t.fechaBaja||'9999-12-31';
    var diasDebio=dias.filter(function(d){return d>=ingreso&&d<=baja;});
    var diasMarcados=CACHE.asistencias.filter(function(a){return a.tId===t.id&&a.fecha>=fF&&a.fecha<=fH;}).map(function(a){return a.fecha;});
    var faltasDias=diasDebio.filter(function(d){return diasMarcados.indexOf(d)<0;});
    if(faltasDias.length>0){
      resultado.push({t:t,faltas:faltasDias,marcados:diasMarcados.length,debio:diasDebio.length});
    }
  });
  var el=document.getElementById('faltas-res');
  if(!resultado.length){
    el.innerHTML='<div class="empty" style="margin-top:12px">Sin faltas en el periodo seleccionado</div>';
    return;
  }
  var totalFaltas=resultado.reduce(function(s,r){return s+r.faltas.length;},0);
  el.innerHTML=
    '<div style="background:#fef3e2;border:1px solid #f5d89a;border-radius:10px;padding:12px 14px;margin:12px 0;display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-weight:700;color:#7d4e00">'+resultado.length+' trabajador'+(resultado.length!==1?'es':'')+' con faltas</span>'+
      '<span style="font-size:18px;font-weight:800;color:#7d4e00">'+totalFaltas+' dia'+(totalFaltas!==1?'s':'')+' total</span>'+
    '</div>'+
    resultado.map(function(r){
      var rowsFaltas=r.faltas.slice(0,10).map(function(d){
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f9f0e0">'+
          '<span style="font-size:12px;color:#7d4e00">'+fmtF(d)+'</span>'+
          '<button class="btn bo bsm" style="font-size:11px;padding:4px 10px" data-tid="'+r.t.id+'" data-fecha="'+d+'" onclick="mJustif(this.dataset.tid,this.dataset.fecha)">Justificar</button>'+
        '</div>';
      }).join('');
      var masStr=r.faltas.length>10?'<div style="font-size:11px;color:var(--t3);padding:4px 0">...y '+(r.faltas.length-10)+' dia'+(r.faltas.length-10!==1?'s':'')+' más</div>':'';
      return '<div class="card" style="margin-bottom:10px;border-color:#f5d89a">'+
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
          '<div class="av av-r" style="width:36px;height:36px;font-size:12px">'+inic(r.t.nombres)+'</div>'+
          '<div style="flex:1">'+
            '<div style="font-weight:700;font-size:13px">'+r.t.nombres+'</div>'+
            '<div style="font-size:11px;color:var(--t2)">'+r.t.area+' · Marcados: '+r.marcados+' · Faltas: <strong style="color:var(--r)">'+r.faltas.length+'</strong></div>'+

// JEFE ADMIN - Marcacion de administrativos
// Misma logica que bodega, filtrado por area ADMINISTRACION
// ════════════════════════════════════════════
let aFecha=hoy(),aMap={},aFechaLoaded='';

function rMarcAdmin(){
  var act=CACHE.trabajadores.filter(function(t){return t.estado==='activo'&&t.area==='ADMINISTRACION';});
  var d=new Date(aFecha+'T12:00:00');
  var eFin=d.getDay()===0||d.getDay()===6;

  if(aFechaLoaded!==aFecha){
    aFechaLoaded=aFecha;
    aMap={};
    CACHE.asistencias.filter(function(a){return a.fecha===aFecha&&act.find(function(t){return t.id===a.tId;});}).forEach(function(a){
      if(a.falta){
        aMap[a.tId]={presente:false,falta:true,entrada:'08:00',salida:'17:00',feriado:false,atraso:0,almuerzo:false,obs:a.obs||''};
      } else {
        aMap[a.tId]={presente:true,falta:false,entrada:a.entrada,salida:a.salida,feriado:a.feriado,atraso:a.atraso||0,almuerzo:a.almuerzo||false,obs:a.obs||''};
      }
    });
  } else {
    CACHE.asistencias.filter(function(a){return a.fecha===aFecha&&act.find(function(t){return t.id===a.tId;});}).forEach(function(a){
      if(!aMap[a.tId]){
        if(a.falta){
          aMap[a.tId]={presente:false,falta:true,entrada:'08:00',salida:'17:00',feriado:false,atraso:0,almuerzo:false,obs:a.obs||''};
        } else {
          aMap[a.tId]={presente:true,falta:false,entrada:a.entrada,salida:a.salida,feriado:a.feriado,atraso:a.atraso||0,almuerzo:a.almuerzo||false,obs:a.obs||''};
        }
      }
    });
  }

  var rows=act.map(function(t){
    var m=aMap[t.id]||{presente:false,entrada:'08:00',salida:'17:00',feriado:eFin,atraso:0,almuerzo:false,obs:''};
    var eFinVal=eFin?1:0;
    var esFin=eFin||m.feriado;
    return '<div class="mcard'+(m.presente?' pre':m.falta?' style=\"border-color:var(--r);background:#fde8e4\"':'')+'" id="ama-'+t.id+'">'+
      '<div class="mtop">'+
        '<div class="mchk'+(m.presente?' on':'')+'" id="amchk-'+t.id+'" data-id="'+t.id+'" data-efin="'+eFinVal+'" onclick="togABtn(this)">'+(m.presente?'&#x2713;':m.falta?'&#x2717;':'')+'</div>'+
        '<div style="flex:1"><div class="mname">'+t.nombres+'</div><div class="marea">'+t.cargo+(m.falta?' &nbsp;<span style="background:var(--r);color:#fff;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:700">FALTA</span>':'')+'</div></div>'+
      '</div>'+
      '<div class="mdet'+(m.presente?' show':'')+'" id="amdet-'+t.id+'">'+
        (esFin
          ? '<div class="mtimes">'+
              '<div class="field"><label>Entrada</label><input type="time" id="aent-'+t.id+'" value="'+m.entrada+'" data-id="'+t.id+'"></div>'+
              '<div class="field"><label>Salida</label><input type="time" id="asal-'+t.id+'" value="'+m.salida+'" data-id="'+t.id+'"></div>'+
            '</div>'+
            '<label class="mfer-row"><input type="checkbox" id="aalm-'+t.id+'" '+(m.almuerzo?'checked':'')+' style="width:18px;height:18px;accent-color:var(--v)"><span>Tomo hora de almuerzo (se descuenta 1h)</span></label>'
          : '<div class="field" style="margin-bottom:8px"><label>Atraso (horas)</label><input type="number" id="aatr-'+t.id+'" min="0" max="8" step="0.5" value="'+(m.atraso||0)+'" placeholder="0" style="max-width:120px"></div>'
        )+
        '<div class="field"><label>Observacion</label><input id="aobs-'+t.id+'" value="'+(m.obs||'')+'" placeholder="Opcional..."></div>'+
      '</div>'+
      (!m.presente?
        '<div style="margin-top:8px;display:flex;gap:6px">'+
          (m.falta
            ? '<button class="btn bgr bsm" style="flex:1" data-id="'+t.id+'" onclick="quitarFalta(this.dataset.id,\'admin\')">&#x2715; Quitar falta</button>'
            : '<button class="btn br bsm" style="flex:1" data-id="'+t.id+'" onclick="marcarFaltaRap(this.dataset.id,\'admin\')">&#x2717; Falta rapida</button>'+
              '<button class="btn bo bsm" style="flex:1" data-id="'+t.id+'" onclick="marcarFaltaMot(this.dataset.id,\'admin\')">Falta + motivo</button>'
          )+
        '</div>'
      :'')+
    '</div>';
  }).join('');

  pg('marc_admin',
    '<div class="shdr"><div><div class="stit">Marcacion - Administrativos</div><div class="ssub">'+fmtFL(aFecha)+'</div></div>'+
    '<div class="field" style="margin:0"><input type="date" id="afd" value="'+aFecha+'" onchange="chAFecha(this.value)" style="font-size:13px;padding:7px 10px"></div></div>'+
    (eFin?'<div class="alerto">Fin de semana - registre hora entrada, salida y si tomo almuerzo</div>':'')+
    (act.length ? rows : '<div class="empty">Sin administrativos eventuales activos.</div>')+
    '<div style="position:sticky;bottom:8px;margin-top:16px;padding:4px">'+
      '<button class="btn bg bfull" style="box-shadow:0 4px 12px rgba(26,92,50,.35);font-size:15px;padding:14px" onclick="guardAdmin()">&#x1F4BE; Guardar marcacion del dia</button>'+
    '</div>');
}

window.chAFecha=function(f){aFecha=f;aFechaLoaded='';aMap={};rMarcAdmin();};

window.togABtn=function(el){
  var tId=el.dataset.id, eFin=el.dataset.efin==='1';
  if(!aMap[tId])aMap[tId]={presente:false,entrada:'08:00',salida:'17:00',feriado:eFin,obs:''};
  aMap[tId].presente=!aMap[tId].presente;
  var m=aMap[tId];
  var chk=document.getElementById('amchk-'+tId);
  if(chk){chk.innerHTML=m.presente?'&#x2713;':'';chk.className='mchk'+(m.presente?' on':'');}
  var card=document.getElementById('ama-'+tId);
  if(card)card.className='mcard'+(m.presente?' pre':'');
  var det=document.getElementById('amdet-'+tId);
  if(det)det.className='mdet'+(m.presente?' show':'');
  var pd=document.getElementById('apd-'+tId);
  if(pd){
    if(m.presente){
      // Find the trabajador sueldo from CACHE
      var tw=CACHE.trabajadores.find(function(x){return x.id===tId;});
      var vd=calcPAdmin(aFecha,aMap[tId].entrada,aMap[tId].salida,aMap[tId].feriado,tw?tw.sueldo||500:500);
      pd.innerHTML='<div class="mpago">$'+vd.toFixed(2)+'</div><div style="font-size:10px;color:var(--t2)">1 dia</div>';
    } else {
      pd.innerHTML='';
    }
  }
  if(m.presente)updA(tId,eFin);
};

window.updABtn=function(el){updA(el.dataset.id,el.dataset.efin==='1');};

window.updA=function(tId,eFin){
  var en=document.getElementById('aent-'+tId);
  var sa=document.getElementById('asal-'+tId);
  var fe=document.getElementById('afer-'+tId);
  var enVal=en?en.value:'08:00';
  var saVal=sa?sa.value:'17:00';
  var feVal=fe?fe.checked:eFin;
  // Admin: precio es fijo por dia, no depende de horas
  if(aMap[tId]){aMap[tId].entrada=enVal;aMap[tId].salida=saVal;aMap[tId].feriado=feVal;}
};

window.guardAdmin=async function(){
  var act=CACHE.trabajadores.filter(function(t){return t.estado==='activo'&&t.area==='ADMINISTRACION';});
  var btns=document.querySelectorAll('[onclick="guardAdmin()"]');
  btns.forEach(function(b){b.disabled=true;b.textContent='Guardando...';});
  try{
    var d=new Date(aFecha+'T12:00:00');
    var eFin=d.getDay()===0||d.getDay()===6;
    var registros=act.filter(function(t){return aMap[t.id]&&aMap[t.id].presente;}).map(function(t){
      var esFin=eFin||aMap[t.id].feriado;
      var entEl=document.getElementById('aent-'+t.id);
      var salEl=document.getElementById('asal-'+t.id);
      var almEl=document.getElementById('aalm-'+t.id);
      var atrEl=document.getElementById('aatr-'+t.id);
      var obsEl=document.getElementById('aobs-'+t.id);
      return{
        tId:t.id,fecha:aFecha,
        entrada:entEl?entEl.value:'08:00',
        salida:salEl?salEl.value:'17:00',
        feriado:esFin,
        almuerzo:almEl?almEl.checked:false,
        atraso:atrEl?parseFloat(atrEl.value)||0:0,
        obs:obsEl?obsEl.value:''
      };
    });
    // Borrar registros existentes (solo ADMIN)
    var existentes=CACHE.asistencias.filter(function(a){return a.fecha===aFecha&&act.find(function(t){return t.id===a.tId;});});
    await Promise.all(existentes.map(function(a){return fdel('asistencias',a.id);}));
    // Guardar nuevos registros
    await Promise.all(registros.map(function(r){return fadd('asistencias',r);}));
    registros.forEach(function(r){aMap[r.tId]={presente:true,entrada:r.entrada,salida:r.salida,feriado:r.feriado,almuerzo:r.almuerzo,atraso:r.atraso,obs:r.obs};});
    aFechaLoaded=aFecha;
    toast('Marcacion admin guardada: '+registros.length+' persona'+(registros.length!==1?'s':''));
    setTimeout(function(){if(tabActual==='hist_admin')rHistAdmin();},1000);
  }catch(e){toast('Error: '+e.message,'err');}
  finally{btns.forEach(function(b){b.disabled=false;b.innerHTML='&#x1F4BE; Guardar marcacion del dia';});}
};

let faF='',faH='';
function rFaltasAdmin(){

  if(!faH)faH=hoy();
  pg('faltas_admin',
    '<div class="stit" style="margin-bottom:12px">Faltas - Administrativos</div>'+

window.genFaltasAdmin=function(){
  faF=document.getElementById('faf').value;
  faH=document.getElementById('fah').value;
  var dias=[];
  var cur=new Date(faF+'T12:00:00'),fin=new Date(faH+'T12:00:00');
  while(cur<=fin){dias.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  var trabjs=CACHE.trabajadores.filter(function(t){return t.area==='ADMINISTRACION'&&(t.estado==='activo'||t.estado==='baja'||t.estado==='contrato');});
  var resultado=[];
  trabjs.forEach(function(t){
    var ingreso=t.fechaIngreso||'2000-01-01',baja=t.fechaBaja||'9999-12-31';
    var diasDebio=dias.filter(function(d){return d>=ingreso&&d<=baja;});
    var diasMarcados=CACHE.asistencias.filter(function(a){return a.tId===t.id&&a.fecha>=faF&&a.fecha<=faH;}).map(function(a){return a.fecha;});
    var faltasDias=diasDebio.filter(function(d){return diasMarcados.indexOf(d)<0;});
    if(faltasDias.length>0)resultado.push({t:t,faltas:faltasDias,marcados:diasMarcados.length});
  });
  var el=document.getElementById('faltas-admin-res');
  if(!resultado.length){el.innerHTML='<div class="empty" style="margin-top:12px">Sin faltas en el periodo</div>';return;}
  var totalFaltas=resultado.reduce(function(s,r){return s+r.faltas.length;},0);
  el.innerHTML=
    '<div style="background:#fef3e2;border:1px solid #f5d89a;border-radius:10px;padding:12px 14px;margin:12px 0;display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-weight:700;color:#7d4e00">'+resultado.length+' admin con faltas</span>'+
      '<span style="font-size:18px;font-weight:800;color:#7d4e00">'+totalFaltas+' dia'+(totalFaltas!==1?'s':'')+' total</span>'+
    '</div>'+
    resultado.map(function(r){
      return '<div class="card" style="margin-bottom:10px;border-color:#f5d89a">'+
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
          '<div class="av av-r" style="width:36px;height:36px;font-size:12px">'+inic(r.t.nombres)+'</div>'+
          '<div><div style="font-weight:700;font-size:13px">'+r.t.nombres+'</div>'+
          '<div style="font-size:11px;color:var(--t2)">Marcados: '+r.marcados+' · Faltas: <strong style="color:var(--r)">'+r.faltas.length+'</strong></div></div>'+
        '</div>'+
        r.faltas.slice(0,10).map(function(d){
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f9f0e0">'+
            '<span style="font-size:12px;color:#7d4e00">'+fmtF(d)+'</span>'+
            '<button class="btn bo bsm" style="font-size:11px;padding:4px 10px" data-tid="'+r.t.id+'" data-fecha="'+d+'" onclick="mJustif(this.dataset.tid,this.dataset.fecha)">Justificar</button>'+
          '</div>';
        }).join('')+
        (r.faltas.length>10?'<div style="font-size:11px;color:var(--t3);padding:4px 0">...y '+(r.faltas.length-10)+' dias mas</div>':'')+
      '</div>';
    }).join('');
};

// Historial admin
function rHistAdmin(){
  var act=CACHE.trabajadores.filter(function(t){return t.area==='ADMINISTRACION';});
  var as=[...CACHE.asistencias.filter(function(a){return act.find(function(t){return t.id===a.tId;});})].sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  pg('hist_admin',
    '<div class="shdr"><div class="stit">Historial administrativos</div><div class="ssub">Solo lectura. Para corregir dias anteriores, contacte a RRHH.</div></div>'+
    (as.length
      ? '<div class="iwrap"><table><thead><tr><th>Fecha</th><th>Nombre</th><th>Estado</th><th>Detalle</th></tr></thead><tbody>'+
        as.map(function(a){
          var t=CACHE.trabajadores.find(function(x){return x.id===a.tId;});
          if(!t)return'';
          var esFalta=a.falta;
          var esJ=a.justificado;
          var d=new Date(a.fecha+'T12:00:00');
          var esFin=d.getDay()===0||d.getDay()===6||a.feriado;
          var detalle='';
          if(esFalta) detalle='<span style="color:var(--r);font-weight:700">FALTA</span>';
          else if(esJ) detalle='<span style="color:var(--a);font-weight:700">Justificado</span>';
          else if(esFin) detalle=a.entrada+' - '+a.salida+(a.almuerzo?' · almuerzo desc.':'');
          else detalle='Presente'+(a.atraso>0?' · <span style="color:var(--r)">atraso '+a.atraso+'h</span>':'');
          return '<tr>'+
            '<td style="white-space:nowrap">'+fmtF(a.fecha)+'</td>'+
            '<td><strong>'+t.nombres+'</strong><br><span style="font-size:10px;color:var(--t3)">'+t.cargo+'</span></td>'+
            '<td>'+(esFalta?'<span class="bdg bdg-r">Falta</span>':esJ?'<span class="bdg bdg-o">Justif.</span>':esFin?'<span class="bdg bdg-b">Fin sem.</span>':'<span class="bdg bdg-g">Presente</span>')+'</td>'+
            '<td>'+detalle+'</td>'+
          '</tr>';
        }).join('')+
        '</tbody></table></div>'
      : '<div class="empty">Sin registros de asistencia</div>')
  );
}



// Botones de falta rápida y falta con motivo para bodega y admin
window.marcarFaltaRap=async function(tId,modulo){
  var fecha=modulo==='admin'?aFecha:mFecha;
  var t=CACHE.trabajadores.find(function(x){return x.id===tId;});
  if(!t)return;
  // Guardar falta como asistencia con marca especial entrada/salida 00:00 y obs FALTA
  try{
    // Eliminar marcacion existente si hay
    var exist=CACHE.asistencias.find(function(a){return a.tId===tId&&a.fecha===fecha;});
    if(exist)await fdel('asistencias',exist.id);
    await fadd('asistencias',{tId:tId,fecha:fecha,entrada:'00:00',salida:'00:00',feriado:false,obs:'[FALTA]',falta:true,justificado:false});
    toast('Falta registrada: '+t.nombres);
  }catch(e){toast('Error: '+e.message,'err');}
};

window.marcarFaltaMot=function(tId,modulo){
  var t=CACHE.trabajadores.find(function(x){return x.id===tId;});
  if(!t)return;
  window._faltaId=tId;
  window._faltaMod=modulo;
  openModal('Registrar falta - '+t.nombres,
    '<div class="field" style="margin-bottom:10px"><label>Tipo</label>'+
      '<select id="fTipo">'+
        '<option>Falta injustificada</option>'+
        '<option>Enfermedad</option>'+
        '<option>Permiso personal</option>'+
        '<option>Permiso autorizado</option>'+
        '<option>Calamidad domestica</option>'+
        '<option>Abandono sin aviso</option>'+
        '<option>Otro</option>'+
      '</select>'+
    '</div>'+
    '<div class="field" style="margin-bottom:14px"><label>Observacion</label>'+
      '<textarea id="fObs" placeholder="Detalle del motivo..."></textarea>'+
    '</div>'+
    '<div class="brow" style="justify-content:flex-end">'+
      '<button class="btn bgr" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn br" onclick="confFaltaMot()">Registrar falta</button>'+
    '</div>');
};

window.quitarFalta=async function(tId,modulo){
  var fecha=modulo==='admin'?aFecha:mFecha;
  var exist=CACHE.asistencias.find(function(a){return a.tId===tId&&a.fecha===fecha&&a.falta;});
  if(exist){
    try{
      await fdel('asistencias',exist.id);
      // Clear from local map
      if(modulo==='admin'&&aMap[tId])delete aMap[tId];
      if(modulo==='bodega'&&mMap[tId])delete mMap[tId];
      toast('Falta eliminada');
    }catch(e){toast('Error: '+e.message,'err');}
  }
};
window.confFaltaMot=async function(){
  var tId=window._faltaId,modulo=window._faltaMod;
  if(!tId)return;
  var fecha=modulo==='admin'?aFecha:mFecha;
  var tipo=document.getElementById('fTipo').value;
  var obs=document.getElementById('fObs').value;
  try{
    var exist=CACHE.asistencias.find(function(a){return a.tId===tId&&a.fecha===fecha;});
    if(exist)await fdel('asistencias',exist.id);
    await fadd('asistencias',{tId:tId,fecha:fecha,entrada:'00:00',salida:'00:00',feriado:false,obs:'[FALTA:'+tipo+'] '+obs,falta:true,justificado:false});
    window._faltaId=null;window._faltaMod=null;
    closeModal();
    toast('Falta registrada correctamente');
  }catch(e){toast('Error: '+e.message,'err');}
};

    loader.style.display='none';
    document.getElementById('login').style.display='flex';
